<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>👥 User Management | Bingo Admin</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #0a0f1c; color: #eee; padding: 12px; margin: 0; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #f39c12; font-size: 1.6rem; margin: 0 0 16px; text-align: center; }
    .total-card { background: #1e3a3f; border-radius: 28px; padding: 14px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; border-left: 6px solid #f39c12; }
    .total-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #f39c12; font-weight: bold; }
    .total-value { font-size: 1.8rem; font-weight: 800; color: #2ecc71; }
    .stats-bar { background: #2c3e50; border-radius: 40px; padding: 10px 18px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .players-table-wrapper { background: #0f1724; border-radius: 24px; padding: 4px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 600px; }
    th { text-align: left; padding: 12px 8px; background: #0f1724; color: #f39c12; font-weight: bold; border-bottom: 2px solid #f39c12; }
    td { padding: 12px 8px; border-bottom: 1px solid #2c3e50; vertical-align: middle; }
    .handle { color: #2ecc71; font-family: monospace; }
    .telegram-id { font-family: monospace; font-size: 0.75rem; background: #0f1724; padding: 4px 6px; border-radius: 8px; display: inline-block; }
    .balance-positive { color: #2ecc71; font-weight: bold; }
    .balance-zero { color: #95a5a6; }
    .balance-negative { color: #e74c3c; font-weight: bold; }
    button { background: #f39c12; border: none; padding: 10px 20px; border-radius: 48px; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: 0.1s; }
    .delete-btn { background: #e74c3c; color: white; padding: 4px 12px; font-size: 0.75rem; }
    .edit-balance-btn { background: #3498db; color: white; padding: 4px 12px; font-size: 0.75rem; margin-right: 6px; }
    .refresh-btn { background: #3498db; color: white; margin-bottom: 20px; width: auto; display: inline-block; }
    button:active { transform: scale(0.97); }
    .empty-message { text-align: center; padding: 32px 20px; color: #95a5a6; font-style: italic; }
    .footer { text-align: center; font-size: 0.7rem; margin-top: 24px; color: #5d6d7e; }
    @media (max-width: 700px) { th, td { padding: 8px 4px; font-size: 0.75rem; } .total-value { font-size: 1.4rem; } }
  </style>
</head>
<body>
<div class="container">
  <h1>👥 User Management</h1>

  <div class="total-card">
    <span class="total-label">💰 TOTAL BALANCE (All users)</span>
    <span class="total-value" id="totalBalanceSum">0</span>
  </div>
  <div class="stats-bar">
    <span>👥 Total registered:</span>
    <span id="registeredCount">0</span>
    <button id="refreshBtn" class="refresh-btn">⟳ Refresh List</button>
  </div>

  <div class="players-table-wrapper">
    <table id="usersTable">
      <thead>
        <tr><th>@ Handle</th><th>🆔 Telegram ID</th><th>👤 Username</th><th>💰 Balance</th><th>✏️ Balance</th><th>Actions</th></tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="6" class="empty-message">Loading users…</td></tr>
      </tbody>
    </table>
  </div>
  <div class="footer">⚠️ Deleting a user removes them from all active games and the database. They can rejoin as a new player.</div>
</div>

<script>
  const ADMIN_SECRET = prompt("Enter admin secret:") || "your_secret_here";
  const API_BASE = '';
  let adminSocket = null;

  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

  function connectAdminSocket() {
    if (adminSocket) adminSocket.disconnect();
    adminSocket = io('/admin', { query: { secret: ADMIN_SECRET } });
    adminSocket.on('connect', () => {
      console.log('Admin socket connected for user management');
      adminSocket.emit('admin:getAllRegisteredPlayers');
    });
    adminSocket.on('admin:allRegisteredPlayers', (data) => {
      renderUsersTable(data.users);
    });
    adminSocket.on('connect_error', (err) => {
      console.error('Socket error:', err);
      document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="6" class="empty-message">❌ WebSocket error – check secret and server.</td></tr>';
    });
  }

  async function editBalance(telegramId) {
    const newBalance = prompt(`Enter new balance (ETB) for user ${telegramId}:`, '0');
    if (newBalance === null) return; // cancelled
    const num = parseFloat(newBalance);
    if (isNaN(num) || num < 0) {
      alert('Please enter a valid non‑negative number.');
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/admin/set-balance`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, userId: telegramId, newBalance: num })
      });
      const data = await res.json();
      if (data.success) {
        alert(`✅ Balance for ${telegramId} updated to ${num} ETB.`);
        // Refresh the list via socket
        if (adminSocket) adminSocket.emit('admin:getAllRegisteredPlayers');
      } else {
        alert(`❌ Error: ${data.error || 'Update failed'}`);
      }
    } catch (err) {
      alert(`⚠️ Network error: ${err.message}`);
    }
  }

  function renderUsersTable(users) {
    const tbody = document.getElementById('usersTableBody');
    const countSpan = document.getElementById('registeredCount');
    countSpan.innerText = users ? users.length : 0;

    let totalBalance = 0;
    if (users && users.length > 0) {
      totalBalance = users.reduce((sum, u) => sum + (u.balance || 0), 0);
    }
    document.getElementById('totalBalanceSum').innerText = totalBalance.toLocaleString();

    if (!users || users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-message">📭 No registered users found.</td></tr>';
      return;
    }

    const sorted = [...users].sort((a, b) => (b.balance || 0) - (a.balance || 0));
    let html = '';
    sorted.forEach(user => {
      const telegramId = escapeHtml(user.telegramId);
      const username = escapeHtml(user.username) || '—';
      const balance = user.balance ?? 0;
      const handle = user.telegram_handle;
      const handleDisplay = handle ? `@${handle}` : '—';
      let balanceClass = 'balance-zero';
      if (balance > 0) balanceClass = 'balance-positive';
      else if (balance < 0) balanceClass = 'balance-negative';
      const formattedBalance = balance.toLocaleString();

      html += `
        <tr>
          <td><span class="handle">${handleDisplay}</span></td>
          <td><span class="telegram-id">${telegramId}</span></td>
          <td>📱 ${username}</td>
          <td><span class="${balanceClass}">${formattedBalance}</span></td>
          <td><button class="edit-balance-btn" data-id="${telegramId}">✏️ Edit</button></td>
          <td><button class="delete-btn" data-id="${telegramId}" style="background:#e74c3c; padding:4px 12px;">🗑️ Delete</button></td>
        </tr>
      `;
    });
    tbody.innerHTML = html;

    // Attach edit event listeners
    document.querySelectorAll('.edit-balance-btn').forEach(btn => {
      btn.removeEventListener('click', handleEdit);
      btn.addEventListener('click', handleEdit);
    });

    // Attach delete event listeners
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.removeEventListener('click', handleDelete);
      btn.addEventListener('click', handleDelete);
    });
  }

  async function handleEdit(e) {
    const telegramId = e.currentTarget.getAttribute('data-id');
    await editBalance(telegramId);
  }

  async function handleDelete(e) {
    const telegramId = e.currentTarget.getAttribute('data-id');
    if (!confirm(`⚠️ Delete user ${telegramId}?\nThis will remove them from all active games and database permanently.`)) return;
    try {
      const res = await fetch(`${API_BASE}/admin/delete-user`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, telegramId })
      });
      const data = await res.json();
      alert(data.success ? `User ${telegramId} deleted.` : `Error: ${data.error}`);
      if (data.success && adminSocket) {
        adminSocket.emit('admin:getAllRegisteredPlayers');
      }
    } catch (err) {
      alert(`Delete failed: ${err.message}`);
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', () => {
    if (adminSocket) adminSocket.emit('admin:getAllRegisteredPlayers');
  });

  connectAdminSocket();
</script>
</body>
</html>
