<script>
// ... (all your existing JavaScript, but modify the submitDepositRequest function)

async function submitDepositRequest() {
  if (isSubmittingDeposit) return;
  const phone = document.getElementById('depositPlayerPhone').value.trim();
  const amount = document.getElementById('depositAmount').value.trim();
  if (!phone.match(/^(09|07)\d{8}$/)) { alert('Invalid phone number.'); return; }
  if (!amount || isNaN(amount) || Number(amount) < 10) { alert('Minimum deposit 10 ETB'); return; }

  isSubmittingDeposit = true;
  const submitBtn = document.getElementById('submitDepositBtn');
  const originalText = submitBtn.innerText;
  submitBtn.disabled = true;
  submitBtn.innerText = '⏳ Sending...';

  try {
    const response = await fetch('/api/request-deposit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, amount, payment_type: selectedDepositType })
    });
    const result = await response.json();

    if (result.success) {
      // Close the deposit modal
      document.getElementById('depositDetailsModal').classList.remove('active');

      // ---- NEW: Fetch USSD code for the selected method ----
      const accountsRes = await fetch('/api/deposit-accounts');
      const accounts = await accountsRes.json();
      const methodInfo = accounts[selectedDepositType];
      const ussdCode = methodInfo ? methodInfo.ussd : null;

      if (ussdCode) {
        // Show the dial overlay only if a USSD code is provided
        const methodName = selectedDepositType.charAt(0).toUpperCase() + selectedDepositType.slice(1);
        showUssdDialer(ussdCode, methodName);
        // Also show a confirmation alert
        setTimeout(() => {
          alert(`✅ Deposit request submitted!\n📱 Please complete the payment by dialing ${ussdCode} for ${methodName}.`);
        }, 400);
      } else {
        // No USSD – just confirm
        alert('✅ Deposit request submitted!');
      }
    } else {
      alert('❌ Error: ' + (result.error || 'Submission failed'));
    }
  } catch (err) {
    alert('⚠️ Network error.');
  } finally {
    isSubmittingDeposit = false;
    submitBtn.disabled = false;
    submitBtn.innerText = originalText;
    unlockSpeech();
  }
}
</script>
