<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bingo Invite Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* (Same styles as before, plus minor additions) */
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(145deg, #0b0e14 0%, #1a1f2b 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1300px;
      margin: 0 auto;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 35px 30px;
      box-shadow: 0 25px 50px -10px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 20px;
    }
    .header-left h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #f0b94b, #fcd34d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-left p { color: #8892a8; font-size: 14px; }
    .total-box {
      background: rgba(255,215,0,0.08);
      padding: 10px 24px;
      border-radius: 60px;
      border: 1px solid rgba(255,215,0,0.15);
      text-align: center;
    }
    .total-box span { color: #aab4c9; font-size: 14px; display: block; }
    .total-box .total-count {
      color: #fcd34d;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.2;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .status-bar .mode-badge {
      background: #2a3242;
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 13px;
      color: #cbd5e1;
    }
    .refresh-btn {
      background: transparent;
      border: 1px solid #3a4458;
      color: #b0bcca;
      padding: 8px 22px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .refresh-btn:hover { background: #2a3242; border-color: #fcd34d; color: #fff; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 18px 20px 20px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,215,0,0.2); transform: translateY(-3px); }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 8px;
    }
    .code-badge {
      background: #2f3b4f;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      color: #fcd34d;
      text-transform: uppercase;
    }
    .stats-mini {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #aab4c9;
    }
    .stats-mini span i { color: #fcd34d; margin-right: 4px; }
    .stats-mini .num { color: #e2e8f0; font-weight: 600; }
    .player-list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 6px;
      background: #0f141e;
      border-radius: 12px;
      padding: 6px 10px;
    }
    .player-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
      color: #cbd5e1;
    }
    .player-item:last-child { border-bottom: none; }
    .player-item .bonus { color: #4ade80; font-weight: 600; }
    .link-box {
      display: flex;
      background: #131a24;
      border-radius: 12px;
      padding: 4px;
      border: 1px solid #293241;
      margin-top: 6px;
    }
    .link-box input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 12px;
      color: #b9c7dd;
      font-size: 12px;
      outline: none;
      font-family: 'Courier New', monospace;
    }
    .copy-btn {
      background: #2a3548;
      border: none;
      color: #d1dbe8;
      padding: 6px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }
    .copy-btn:hover { background: #fcd34d; color: #0b0e14; }
    .copy-btn.copied { background: #10b981; color: #fff; }
    .no-players { color: #64748b; font-style: italic; font-size: 13px; padding: 4px 0; }
    .total-bonus-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      font-weight: 600;
      color: #fcd34d;
    }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1><i class="fas fa-gift" style="margin-right:12px; color:#fcd34d;"></i>Referral Dashboard</h1>
        <p>@bingomkmk0120_bot · Each invite earns 10% of first deposit</p>
      </div>
      <div class="total-box">
        <span>TOTAL BONUS EARNED</span>
        <div class="total-count" id="totalBonus">0</div>
      </div>
    </div>
    <div class="status-bar">
      <div class="mode-badge"><i class="fas fa-circle" style="color:#10b981;"></i> Live</div>
      <button class="refresh-btn" onclick="loadData()"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
    <div class="grid" id="cardsContainer"></div>
  </div>

  <script>
    const CODES = ['db', 'mk', 'hd', 'ji', 'ok', 'ghy', 'bghu', 'kil', 'hg', 'jkl', 'jkil'];
    const BOT_USERNAME = 'bingomkmk0120_bot';

    // We'll fetch both stats and details
    const STATS_URL = '/api/invite-stats';
    const DETAILS_URL = '/api/invite-details';

    let allData = {};

    async function loadData() {
      const btn = document.querySelector('.refresh-btn i');
      btn.className = 'fas fa-spinner fa-pulse';

      try {
        // Fetch stats (total join counts)
        const statsRes = await fetch(STATS_URL);
        if (!statsRes.ok) throw new Error('Stats fetch failed');
        const stats = await statsRes.json();

        // Fetch details (players & bonuses)
        const detailsRes = await fetch(DETAILS_URL);
        if (!detailsRes.ok) throw new Error('Details fetch failed');
        const details = await detailsRes.json();

        allData = { stats, details: details.data };
        renderCards();
      } catch (err) {
        console.error(err);
        alert('Error loading data: ' + err.message);
      } finally {
        btn.className = 'fas fa-sync-alt';
      }
    }

    function renderCards() {
      const container = document.getElementById('cardsContainer');
      container.innerHTML = '';

      let grandTotalBonus = 0;

      CODES.forEach(code => {
        const count = allData.stats[code] || 0;
        const detail = allData.details[code] || { players: [], totalBonus: 0, totalDeposits: 0 };
        const totalBonus = detail.totalBonus || 0;
        grandTotalBonus += totalBonus;

        const link = `https://t.me/${BOT_USERNAME}?start=${code}`;
        const players = detail.players || [];

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-header">
            <span class="code-badge"><i class="fas fa-hashtag"></i> ${code}</span>
            <div class="stats-mini">
              <span><i class="fas fa-users"></i> <span class="num">${count}</span> joined</span>
              <span><i class="fas fa-coins"></i> <span class="num">${totalBonus.toFixed(2)}</span> bonus</span>
            </div>
          </div>
          <div class="player-list">
            ${players.length === 0 ? '<div class="no-players">No referred players with deposits yet.</div>' :
              players.map(p => `
                <div class="player-item">
                  <span>${p.username || 'Anonymous'}</span>
                  <span>Deposit: ${p.deposit.toFixed(2)} → <span class="bonus">+${p.bonus.toFixed(2)}</span></span>
                </div>
              `).join('')
            }
          </div>
          <div class="total-bonus-row">
            Total Bonus: ${totalBonus.toFixed(2)} ETB
          </div>
          <div class="link-box">
            <input type="text" value="${link}" readonly id="input-${code}" />
            <button class="copy-btn" onclick="copyLink('${code}')"><i class="fas fa-copy"></i> Copy</button>
          </div>
        `;
        container.appendChild(card);
      });

      document.getElementById('totalBonus').textContent = grandTotalBonus.toFixed(2);
    }

    function copyLink(code) {
      const input = document.getElementById(`input-${code}`);
      if (!input) return;
      input.select();
      navigator.clipboard.writeText(input.value).then(() => {
        const btn = input.nextElementSibling;
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
      }).catch(() => {
        document.execCommand('copy');
      });
    }

    document.addEventListener('DOMContentLoaded', loadData);
    setInterval(loadData, 30000);
  </script>
</body>
</html>
