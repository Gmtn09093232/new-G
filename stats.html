<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎲 Bingo · Data Analysis Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      background: #0b0e14;
      color: #e9edf2;
      padding: 18px;
      min-height: 100vh;
    }
    .dashboard {
      max-width: 1500px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 22px;
      border-bottom: 1px solid #2a313c;
      padding-bottom: 14px;
    }
    .header h1 {
      font-weight: 600;
      font-size: 1.8rem;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #f0b94b, #f7d875);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      background: #1f2937;
      border: 1px solid #374151;
      color: #d1d9e6;
      padding: 5px 16px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }
    .btn:hover {
      background: #2d3a4b;
      border-color: #5a6a7e;
    }
    .btn.primary {
      background: #f7c35c;
      border-color: #f7c35c;
      color: #0b0e14;
    }
    .btn.primary:hover {
      background: #fad073;
      border-color: #fad073;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      background: #141b24;
      padding: 12px 18px;
      border-radius: 14px;
      border: 1px solid #232c38;
      margin-bottom: 22px;
    }
    .filter-bar label {
      font-size: 0.7rem;
      color: #7b879c;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .filter-bar input[type="date"] {
      background: #1f2937;
      border: 1px solid #374151;
      color: #e9edf2;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-family: inherit;
    }
    .filter-bar .filter-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    .filter-bar .btn-sm {
      padding: 4px 14px;
      font-size: 0.7rem;
    }
    .filter-info {
      font-size: 0.7rem;
      color: #6b7a93;
      margin-left: auto;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: #141b24;
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid #232c38;
    }
    .kpi-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #7b879c;
      font-weight: 600;
    }
    .kpi-value {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 2px;
      letter-spacing: -0.02em;
      color: #f0f4fa;
    }
    .kpi-value .unit {
      font-size: 0.85rem;
      color: #8892a8;
      font-weight: 400;
      margin-left: 3px;
    }
    .kpi-card.accent .kpi-value { color: #f7c35c; }
    .kpi-card.green .kpi-value { color: #5fcb8a; }
    .kpi-card.pink .kpi-value { color: #f28b9c; }
    .kpi-card.blue .kpi-value { color: #6ab0f7; }
    .kpi-card.purple .kpi-value { color: #b794f4; }
    .chart-box {
      background: #141b24;
      border-radius: 16px;
      padding: 16px 14px 12px;
      border: 1px solid #232c38;
      display: flex;
      flex-direction: column;
      margin-bottom: 22px;
    }
    .chart-box h3 {
      font-size: 0.75rem;
      font-weight: 500;
      color: #b4bfd4;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }
    .chart-container {
      position: relative;
      height: 200px;
      flex: 1;
    }
    .extra-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
      margin-top: 18px;
      margin-bottom: 10px;
    }
    .extra-box {
      background: #141b24;
      border-radius: 16px;
      border: 1px solid #232c38;
      padding: 14px;
      display: flex;
      flex-direction: column;
    }
    .extra-box h3 {
      font-size: 0.75rem;
      font-weight: 500;
      color: #b4bfd4;
      margin-bottom: 8px;
    }
    .round-history-scroll {
      max-height: 190px;
      overflow-y: auto;
      flex: 1;
    }
    .round-entry {
      display: grid;
      grid-template-columns: 70px 45px 50px 50px 55px;
      gap: 4px;
      padding: 3px 0;
      border-bottom: 1px solid #1a212b;
      font-size: 0.65rem;
      color: #cbd5e1;
    }
    .round-entry .r-time { color: #6b7a93; }
    .round-entry .r-stake { color: #f7c35c; }
    .round-entry .r-players { color: #6ab0f7; }
    .round-entry .r-prize { color: #f28b9c; }
    .round-entry .r-profit { color: #5fcb8a; font-weight: 600; }
    .top-player-entry {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid #1a212b;
      font-size: 0.72rem;
      color: #dce2ec;
    }
    .top-player-entry .name { color: #9aa9c0; }
    .top-player-entry .score { font-weight: 500; color: #f7c35c; }
    .extra-box .chart-container { height: 170px; }
    .text-muted { color: #6b7a93; font-size: 0.7rem; }
    .loading { text-align: center; padding: 20px; color: #6b7a93; }
    .error-msg { color: #f28b9c; padding: 20px; text-align: center; }

    @media (max-width: 920px) {
      .extra-grid { grid-template-columns: 1fr 1fr; }
      .filter-bar .filter-actions { margin-left: 0; width: 100%; justify-content: flex-end; }
    }
    @media (max-width: 640px) {
      .extra-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.2rem; }
      .kpi-value { font-size: 1.1rem; }
      body { padding: 10px; }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .filter-bar .filter-actions { justify-content: stretch; }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0b0e14; }
    ::-webkit-scrollbar-thumb { background: #3b485a; border-radius: 10px; }
  </style>
</head>
<body>

  <div class="dashboard">
    <!-- HEADER -->
    <div class="header">
      <h1>📊 Bingo · Data Analysis</h1>
      <div class="header-actions">
        <span class="text-muted" id="status">Ready</span>
      </div>
    </div>

    <!-- DATE FILTER -->
    <div class="filter-bar">
      <label for="filterFrom">From</label>
      <input type="date" id="filterFrom" />
      <label for="filterTo">To</label>
      <input type="date" id="filterTo" />
      <div class="filter-actions">
        <button class="btn btn-sm primary" id="applyFilterBtn">Apply</button>
        <button class="btn btn-sm" id="clearFilterBtn">Clear</button>
      </div>
      <span class="filter-info" id="filterInfo">Loading…</span>
    </div>

    <!-- KPI CARDS -->
    <div class="kpi-grid" id="kpiContainer"></div>

    <!-- HISTORICAL DATA GRID -->
    <div class="extra-grid">
      <div class="extra-box">
        <h3>📜 Past Rounds (with House Profit)</h3>
        <div class="round-history-scroll" id="roundHistoryList">
          <div class="loading">Loading history…</div>
        </div>
      </div>
      <div class="extra-box">
        <h3>🏆 Top Players by Rounds Played</h3>
        <div style="max-height:190px; overflow-y:auto;" id="topRoundsPlayers">
          <div class="loading">Loading history…</div>
        </div>
      </div>
      <div class="extra-box">
        <h3>💰 Player Winning Distribution</h3>
        <div class="chart-container"><canvas id="playerWinChart"></canvas></div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // DATA ANALYSIS DASHBOARD – no WebSocket, only API calls
    // ============================================================

    const ADMIN_SECRET = 'YOUR_ADMIN_SECRET'; // ⚠️ CHANGE THIS

    // ---- DOM refs ----
    const kpiContainer = document.getElementById('kpiContainer');
    const roundHistoryList = document.getElementById('roundHistoryList');
    const topRoundsPlayers = document.getElementById('topRoundsPlayers');
    const filterFromInput = document.getElementById('filterFrom');
    const filterToInput = document.getElementById('filterTo');
    const applyFilterBtn = document.getElementById('applyFilterBtn');
    const clearFilterBtn = document.getElementById('clearFilterBtn');
    const filterInfo = document.getElementById('filterInfo');
    const statusEl = document.getElementById('status');

    // ---- Chart instance ----
    let playerWinChart = null;

    function initChart() {
      const ctx = document.getElementById('playerWinChart').getContext('2d');
      playerWinChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: [],
          datasets: [{ label: 'Est. Winnings (ETB)', data: [], backgroundColor: '#f7c35c', borderRadius: 4 }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#232c38' }, ticks: { color: '#8892a8' } },
            y: { grid: { display: false }, ticks: { color: '#b4bfd4' } }
          }
        }
      });
    }

    // ---- Helper: format time ----
    function formatTime(d) {
      return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ---- Fetch data from API ----
    async function fetchHistory(from, to) {
      statusEl.textContent = 'Loading…';
      let url = `/admin/rounds-history?secret=${ADMIN_SECRET}&limit=500`;
      if (from) url += `&from=${from}T00:00:00`;
      if (to) url += `&to=${to}T23:59:59`;

      try {
        const resp = await fetch(url);
        if (!resp.ok) {
          const errData = await resp.json();
          throw new Error(errData.error || `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        if (!data.success) throw new Error(data.error || 'Unknown API error');
        return data.rounds || [];
      } catch (err) {
        console.error('Fetch error:', err);
        statusEl.textContent = '❌ Error loading data';
        throw err;
      }
    }

    // ---- Process rounds ----
    function processRounds(rounds) {
      // Sort by date descending for display (newest first)
      const sorted = rounds.slice().sort((a, b) => new Date(b.date) - new Date(a.date));

      // Compute aggregate stats
      const totalRounds = rounds.length;
      let totalRevenue = 0, totalPrize = 0, totalProfit = 0;
      rounds.forEach(r => {
        totalRevenue += r.revenue || 0;
        totalPrize += r.prizePool || 0;
        totalProfit += r.profit || 0;
      });
      const avgPlayers = totalRounds > 0 ? rounds.reduce((s, r) => s + r.playerCount, 0) / totalRounds : 0;
      const avgPrize = totalRounds > 0 ? rounds.reduce((s, r) => s + (r.prizePool || 0), 0) / totalRounds : 0;
      const houseNet = totalRevenue - totalPrize;

      return { sorted, totalRounds, totalRevenue, totalPrize, totalProfit, avgPlayers, avgPrize, houseNet };
    }

    // ---- Render KPIs ----
    function renderKPIs(stats) {
      const cards = [
        { label: 'Total Rounds', value: stats.totalRounds, cls: 'blue', unit: '' },
        { label: 'Total Revenue', value: stats.totalRevenue, cls: 'accent', unit: 'ETB' },
        { label: 'Total Prize Pool', value: stats.totalPrize, cls: 'pink', unit: 'ETB' },
        { label: 'House Net', value: stats.houseNet, cls: stats.houseNet >= 0 ? 'green' : 'pink', unit: 'ETB' },
        { label: 'Avg Players / Round', value: stats.avgPlayers, cls: 'purple', unit: '' },
        { label: 'Avg Prize / Round', value: stats.avgPrize, cls: '', unit: 'ETB' },
      ];

      kpiContainer.innerHTML = cards.map(k => `
        <div class="kpi-card ${k.cls}">
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value">${k.value % 1 === 0 ? k.value : k.value.toFixed(1)} <span class="unit">${k.unit}</span></div>
        </div>
      `).join('');
    }

    // ---- Render Past Rounds ----
    function renderRounds(sorted) {
      if (sorted.length === 0) {
        roundHistoryList.innerHTML = `<div class="text-muted" style="padding:10px;">No rounds match the filter</div>`;
        return;
      }
      const html = sorted.slice(0, 50).map(r => `
        <div class="round-entry">
          <span class="r-time">${r.time || formatTime(new Date(r.date))}</span>
          <span class="r-stake">${r.stake}ETB</span>
          <span class="r-players">${r.playerCount}p</span>
          <span class="r-prize">${r.prizePool}</span>
          <span class="r-profit">${r.profit >= 0 ? '+' : ''}${r.profit}</span>
        </div>
      `).join('');
      roundHistoryList.innerHTML = html;
    }

    // ---- Render Top Players ----
    function renderTopPlayers(rounds) {
      // Build player stats from all rounds
      const stats = {};
      for (const round of rounds) {
        const players = round.players || [];
        const playerCount = players.length;
        const prizePool = round.prizePool || 0;
        if (prizePool > 0 && playerCount > 0) {
          const perPlayer = prizePool / playerCount;
          for (const p of players) {
            const id = p.telegram_id;
            const name = p.username || 'Player';
            if (!id) continue;
            if (!stats[id]) {
              stats[id] = { username: name, rounds: 0, totalEstimatedWinnings: 0 };
            }
            stats[id].rounds += 1;
            stats[id].totalEstimatedWinnings += perPlayer;
            stats[id].username = name;
          }
        } else {
          // still count rounds even if no prize
          for (const p of players) {
            const id = p.telegram_id;
            const name = p.username || 'Player';
            if (!id) continue;
            if (!stats[id]) {
              stats[id] = { username: name, rounds: 0, totalEstimatedWinnings: 0 };
            }
            stats[id].rounds += 1;
            stats[id].username = name;
          }
        }
      }

      const sorted = Object.values(stats)
        .sort((a, b) => b.rounds - a.rounds)
        .slice(0, 15);

      if (sorted.length === 0) {
        topRoundsPlayers.innerHTML = `<div class="text-muted" style="padding:10px;">No data available</div>`;
        return;
      }
      topRoundsPlayers.innerHTML = sorted.map(p => `
        <div class="top-player-entry">
          <span class="name">${p.username}</span>
          <span class="score">${p.rounds} rounds · ${p.totalEstimatedWinnings.toFixed(1)} ETB</span>
        </div>
      `).join('');
    }

    // ---- Render Winning Distribution chart ----
    function renderWinningChart(rounds) {
      // Build aggregated winnings per player
      const stats = {};
      for (const round of rounds) {
        const players = round.players || [];
        const playerCount = players.length;
        const prizePool = round.prizePool || 0;
        if (prizePool > 0 && playerCount > 0) {
          const perPlayer = prizePool / playerCount;
          for (const p of players) {
            const id = p.telegram_id;
            const name = p.username || 'Player';
            if (!id) continue;
            if (!stats[id]) {
              stats[id] = { username: name, total: 0 };
            }
            stats[id].total += perPlayer;
            stats[id].username = name;
          }
        }
      }

      const sorted = Object.values(stats)
        .sort((a, b) => b.total - a.total)
        .slice(0, 10);

      const labels = sorted.map(p => p.username);
      const data = sorted.map(p => p.total);

      if (playerWinChart) {
        playerWinChart.data.labels = labels;
        playerWinChart.data.datasets[0].data = data;
        playerWinChart.update();
      }
    }

    // ---- Main load function ----
    async function loadData(from, to) {
      try {
        statusEl.textContent = 'Loading…';
        const rounds = await fetchHistory(from, to);
        const stats = processRounds(rounds);
        renderKPIs(stats);
        renderRounds(stats.sorted);
        renderTopPlayers(rounds);
        renderWinningChart(rounds);
        filterInfo.textContent = `Showing ${rounds.length} rounds`;
        statusEl.textContent = `✅ Loaded ${rounds.length} rounds`;
      } catch (err) {
        statusEl.textContent = '❌ Error';
        filterInfo.textContent = 'Error loading data';
        roundHistoryList.innerHTML = `<div class="error-msg">⚠️ Failed to load history: ${err.message}</div>`;
        topRoundsPlayers.innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
      }
    }

    // ---- Filter handlers ----
    function applyFilter() {
      const fromVal = filterFromInput.value;
      const toVal = filterToInput.value;
      loadData(fromVal, toVal);
    }

    function clearFilter() {
      filterFromInput.value = '';
      filterToInput.value = '';
      loadData(null, null);
    }

    // ---- Init ----
    document.addEventListener('DOMContentLoaded', () => {
      initChart();
      // Set default filter to today (optional)
      const today = new Date().toISOString().split('T')[0];
      filterFromInput.value = today;
      filterToInput.value = today;
      // Load with today's filter
      loadData(today, today);

      // Event listeners
      applyFilterBtn.addEventListener('click', applyFilter);
      clearFilterBtn.addEventListener('click', clearFilter);
    });
  </script>
</body>
</html>
