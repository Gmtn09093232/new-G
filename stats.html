<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎲 Live Bingo · All Players' Cards</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { background: #0b0e14; color: #e9edf2; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #2a313c; padding-bottom: 12px; }
    .header h1 { background: linear-gradient(135deg, #f0b94b, #f7d875); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status { color: #6ab0f7; font-size: 0.9rem; }
    .stake-section { margin-bottom: 30px; }
    .stake-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; color: #b4bfd4; }
    .stake-title span { background: #1f2937; padding: 2px 12px; border-radius: 20px; font-size: 0.8rem; }
    .card-grid { display: flex; flex-wrap: wrap; gap: 12px; }
    .player-card { background: #141b24; border-radius: 12px; padding: 8px; border: 1px solid #232c38; width: 180px; }
    .player-card .pname { font-size: 0.7rem; font-weight: 600; color: #b4bfd4; text-align: center; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
    .mini-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 600; background: #1f2937; border-radius: 4px; color: #6b7a93; }
    .mini-cell.free { background: #2a3342; color: #f7c35c; font-size: 0.45rem; }
    .mini-cell.called { background: #3d6b4a; color: #e2f0e6; }
    .mini-cell.bingo-highlight { background: #f7c35c; color: #0b0e14; font-weight: 700; }
    .no-players { color: #6b7a93; padding: 10px 0; }
    .called-numbers { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .called-num { background: #1f2937; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; color: #b4bfd4; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.6rem; font-weight: 600; }
    .status-badge.lobby { background: #374151; color: #9ca3af; }
    .status-badge.running { background: #065f46; color: #6ee7b7; }
    .status-badge.ended { background: #78350f; color: #fcd34d; }
    .error-msg { color: #f28b9c; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎲 Live Bingo · All Cards</h1>
    <div class="status">🟢 Connected to <span id="roomStatus">—</span></div>
  </div>
  <div id="container"></div>

  <script>
    // ---- Get admin secret from URL ----
    const urlParams = new URLSearchParams(window.location.search);
    const secret = urlParams.get('secret');
    if (!secret) {
      document.getElementById('container').innerHTML = `<div class="error-msg">⚠️ Missing admin secret. Use ?secret=YOUR_SECRET</div>`;
      throw new Error('Missing secret');
    }

    // ---- Connect to admin namespace ----
    const socket = io('/admin', {
      query: { secret }
    });

    const container = document.getElementById('container');
    const roomStatus = document.getElementById('roomStatus');

    socket.on('connect', () => {
      roomStatus.textContent = 'Admin connected';
    });

    socket.on('connect_error', (err) => {
      container.innerHTML = `<div class="error-msg">❌ Connection failed: ${err.message}</div>`;
    });

    socket.on('admin:gameState', (state) => {
      renderState(state);
    });

    // ---- Render function ----
    function renderState(state) {
      let html = '';
      for (const stake of [10, 20, 30]) {
        const room = state[stake];
        if (!room) continue;
        const players = room.players || [];
        const called = room.calledNumbers || [];
        const status = room.status || 'unknown';
        const statusClass = status === 'lobby' ? 'lobby' : status === 'running' ? 'running' : 'ended';

        html += `<div class="stake-section">
          <div class="stake-title">🎯 ${stake} ETB <span class="status-badge ${statusClass}">${status.toUpperCase()}</span> <span style="font-weight:normal;font-size:0.8rem;color:#7b879c;">${players.length} players</span></div>
          <div class="called-numbers">${called.map(n => `<span class="called-num">${n}</span>`).join('')}</div>
          <div class="card-grid">`;

        if (players.length === 0) {
          html += `<div class="no-players">No players yet</div>`;
        } else {
          for (const p of players) {
            const card = p.card;
            if (!card) continue;
            const marked = p.markedNumbers || [];
            html += `<div class="player-card">
              <div class="pname">${p.username || p.telegramId}</div>
              <div class="mini-grid">`;
            for (let row = 0; row < 5; row++) {
              for (let col = 0; col < 5; col++) {
                const val = card[col][row];
                let cls = 'mini-cell';
                if (val === 'FREE') cls += ' free';
                else if (marked.includes(val)) cls += ' called';
                // Optional bingo highlight if we detect bingo (we don't have that info, but could add)
                const display = val === 'FREE' ? '★' : val;
                html += `<div class="${cls}">${display}</div>`;
              }
            }
            html += `</div></div>`;
          }
        }

        html += `</div></div>`;
      }
      container.innerHTML = html;
    }
  </script>
</body>
</html>
