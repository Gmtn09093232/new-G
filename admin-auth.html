<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Access - Bingo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      padding: 20px;
    }

    .auth-box {
      background: white;
      border-radius: 32px;
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .auth-box h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1e293b;
      text-align: center;
      margin-bottom: 4px;
    }

    .auth-box .sub {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 24px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #f1f5f9;
      border-radius: 16px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: white;
      color: #667eea;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .tab-btn:hover:not(.active) {
      color: #334155;
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 4px;
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: 0.2s;
      background: #f8fafc;
    }

    .input-group input:focus, .input-group select:focus {
      border-color: #667eea;
      background: white;
      outline: none;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
    }

    .btn-auth {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }

    .btn-auth:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(102,126,234,0.4);
    }

    .btn-auth:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none !important;
    }

    .msg-box {
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .msg-box.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .msg-box.success {
      background: #d1fae5;
      color: #065f46;
      display: block;
    }

    .loading {
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
      margin-top: 16px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e2e8f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .auth-box {
        padding: 24px 16px;
      }
      .auth-box h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="auth-box">
    <h1>🔐 Admin Access</h1>
    <p class="sub">Login or create your admin account</p>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">🔑 Login</button>
      <button class="tab-btn" data-tab="register" onclick="switchTab('register')">📝 Register</button>
    </div>

    <!-- Messages -->
    <div id="msgBox" class="msg-box"></div>

    <!-- ==================== LOGIN TAB ==================== -->
    <div id="loginTab" class="tab-pane active">
      <div class="input-group">
        <label>📱 Phone Number</label>
        <input type="tel" id="loginPhone" placeholder="09xxxxxxxx" value="0924839730">
      </div>

      <div class="input-group">
        <label>🔑 PIN</label>
        <input type="password" id="loginPin" placeholder="Enter your PIN" value="1234">
      </div>

      <button class="btn-auth" id="loginBtn">➡️ Login</button>
      <div class="loading" id="loginLoading" style="display:none;">
        <span class="spinner"></span> Logging in...
      </div>
    </div>

    <!-- ==================== REGISTER TAB ==================== -->
    <div id="registerTab" class="tab-pane">
      <div class="input-group">
        <label>📱 Phone Number</label>
        <input type="tel" id="regPhone" placeholder="09xxxxxxxx">
      </div>

      <div class="input-group">
        <label>👤 Full Name</label>
        <input type="text" id="regName" placeholder="Your full name">
      </div>

      <div class="input-group">
        <label>💳 Your Deposit Number</label>
        <input type="text" id="regDepositNumber" placeholder="e.g., 0924839730">
      </div>

      <div class="input-group">
        <label>📲 Payment Type</label>
        <select id="regPaymentType">
          <option value="telebirr">Telebirr</option>
          <option value="cbebirr">CBE Birr</option>
          <option value="mpesa">M-Pesa</option>
        </select>
      </div>

      <div class="input-group">
        <label>🔑 Create PIN (at least 4 digits)</label>
        <input type="password" id="regPin" placeholder="Create a PIN">
        <div class="hint">Use a memorable PIN (numbers only)</div>
      </div>

      <div class="input-group">
        <label>🔑 Confirm PIN</label>
        <input type="password" id="regConfirmPin" placeholder="Re-enter PIN">
      </div>

      <!-- Optional: Registration secret field -->
      <div class="input-group" id="secretField" style="display:none;">
        <label>🔐 Registration Secret</label>
        <input type="text" id="regSecret" placeholder="Secret key (if required)">
        <div class="hint">Ask the super admin for the registration secret</div>
      </div>

      <button class="btn-auth" id="registerBtn">🚀 Register</button>
      <div class="loading" id="registerLoading" style="display:none;">
        <span class="spinner"></span> Registering...
      </div>
    </div>
  </div>

  <script>
    // ==================== UTILITY ====================
    function showMessage(message, type = 'error') {
      const box = document.getElementById('msgBox');
      box.textContent = message;
      box.className = 'msg-box ' + type;
      // Auto-hide after 5 seconds (but keep success visible longer)
      clearTimeout(box._timeout);
      box._timeout = setTimeout(() => {
        box.className = 'msg-box';
      }, type === 'success' ? 6000 : 5000);
    }

    function hideMessage() {
      const box = document.getElementById('msgBox');
      box.className = 'msg-box';
    }

    // ==================== TAB SWITCHING ====================
    function switchTab(tab) {
      hideMessage();

      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });

      // Update panes
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab === 'register');

      // Clear any loading states
      document.getElementById('loginLoading').style.display = 'none';
      document.getElementById('registerLoading').style.display = 'none';
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('loginBtn').textContent = '➡️ Login';
      document.getElementById('registerBtn').disabled = false;
      document.getElementById('registerBtn').textContent = '🚀 Register';
    }

    // ==================== LOGIN ====================
    async function login() {
      hideMessage();
      const phone = document.getElementById('loginPhone').value.trim();
      const pin = document.getElementById('loginPin').value.trim();

      if (!phone || !pin) {
        showMessage('Please enter phone and PIN.', 'error');
        return;
      }

      const btn = document.getElementById('loginBtn');
      const loading = document.getElementById('loginLoading');

      loading.style.display = 'block';
      btn.disabled = true;
      btn.textContent = '⏳ ...';

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, pin })
        });

        const data = await res.json();

        if (data.success) {
          showMessage('✅ Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/dashboard', 1000);
        } else {
          showMessage(data.error || 'Login failed.', 'error');
        }
      } catch (err) {
        showMessage('Network error. Please try again.', 'error');
      } finally {
        loading.style.display = 'none';
        btn.disabled = false;
        btn.textContent = '➡️ Login';
      }
    }

    // ==================== REGISTER ====================
    async function register() {
      hideMessage();

      const phone = document.getElementById('regPhone').value.trim();
      const name = document.getElementById('regName').value.trim();
      const depositNumber = document.getElementById('regDepositNumber').value.trim();
      const paymentType = document.getElementById('regPaymentType').value;
      const pin = document.getElementById('regPin').value.trim();
      const confirmPin = document.getElementById('regConfirmPin').value.trim();
      const secret = document.getElementById('regSecret').value.trim();

      // Validation
      if (!phone || !name || !depositNumber || !pin || !confirmPin) {
        showMessage('Please fill in all required fields.', 'error');
        return;
      }

      if (!phone.match(/^(09|07)\d{8}$/)) {
        showMessage('Phone number must be 10 digits starting with 09 or 07.', 'error');
        return;
      }

      if (pin.length < 4 || !/^\d+$/.test(pin)) {
        showMessage('PIN must be at least 4 digits (numbers only).', 'error');
        return;
      }

      if (pin !== confirmPin) {
        showMessage('PINs do not match.', 'error');
        return;
      }

      const btn = document.getElementById('registerBtn');
      const loading = document.getElementById('registerLoading');

      loading.style.display = 'block';
      btn.disabled = true;
      btn.textContent = '⏳ ...';

      try {
        const payload = {
          phone,
          name,
          deposit_number: depositNumber,
          payment_type: paymentType,
          pin,
          confirm_pin: confirmPin,
        };

        // Include secret if field is visible
        const secretField = document.getElementById('secretField');
        if (secretField.style.display !== 'none' && secret) {
          payload.registration_secret = secret;
        }

        const res = await fetch('/admin/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.success) {
          showMessage('✅ Registration successful! Redirecting to login...', 'success');
          // Clear fields
          document.getElementById('regPhone').value = '';
          document.getElementById('regName').value = '';
          document.getElementById('regDepositNumber').value = '';
          document.getElementById('regPin').value = '';
          document.getElementById('regConfirmPin').value = '';
          document.getElementById('regSecret').value = '';
          // Switch to login tab after 2 seconds
          setTimeout(() => {
            switchTab('login');
            // Optionally pre-fill phone
            document.getElementById('loginPhone').value = phone;
          }, 2000);
        } else {
          showMessage(data.error || 'Registration failed.', 'error');
        }
      } catch (err) {
        showMessage('Network error. Please try again.', 'error');
      } finally {
        loading.style.display = 'none';
        btn.disabled = false;
        btn.textContent = '🚀 Register';
      }
    }

    // ==================== CHECK REGISTRATION SECRET ====================
    fetch('/admin/registration-config')
      .then(res => res.json())
      .then(data => {
        if (data.requiresSecret) {
          document.getElementById('secretField').style.display = 'block';
        }
      })
      .catch(() => {});

    // ==================== EVENT LISTENERS ====================
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('registerBtn').addEventListener('click', register);

    // Enter key support
    document.querySelectorAll('#loginTab input').forEach(input => {
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    });
    document.querySelectorAll('#registerTab input').forEach(input => {
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') register(); });
    });
  </script>
</body>
</html>
