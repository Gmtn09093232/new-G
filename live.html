<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Admin Panel | Bingo</title>
    <style>
        /* (keep all your existing CSS exactly as is) */

        /* --- Additional styles for the registered table --- */
        .section-title {
            font-size: 1.2rem;
            margin: 28px 0 12px;
            border-left: 4px solid #f39c12;
            padding-left: 12px;
        }

        .balance-positive {
            color: #2ecc71;
        }

        .balance-zero {
            color: #95a5a6;
        }

        .registered-table td, .registered-table th {
            padding: 10px 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👥 Admin Bingo Panel</h1>
    
    <!-- Live Players (existing) -->
    <div class="status-bar">
        <span>🎮 Game state:</span>
        <span id="gameState" class="game-status">Loading...</span>
    </div>
    <div class="status-bar">
        <span>👤 Players in game:</span>
        <span id="playerCount">0</span>
    </div>

    <div class="players-table-wrapper">
        <table id="playersTable">
            <thead>
                <tr>
                    <th>👤 Username</th>
                    <th>🆔 Telegram ID</th>
                    <th>🎴 Card</th>
                </tr>
            </thead>
            <tbody id="playersTableBody">
                <tr><td colspan="3" class="empty-message">No players in game.</td></tr>
            </tbody>
        </table>
    </div>

    <button id="refreshBtn">⟳ Refresh now</button>

    <!-- NEW: All Registered Players -->
    <h2 class="section-title">📋 All Registered Players</h2>
    <div class="status-bar">
        <span>👥 Total registered:</span>
        <span id="registeredCount">0</span>
    </div>

    <div class="players-table-wrapper registered-table">
        <table id="registeredTable">
            <thead>
                <tr>
                    <th>🆔 Telegram ID</th>
                    <th>👤 Username</th>
                    <th>💰 Balance</th>
                </tr>
            </thead>
            <tbody id="registeredTableBody">
                <tr><td colspan="3" class="empty-message">Loading all users…</td></tr>
            </tbody>
        </table>
    </div>

    <button id="refreshRegisteredBtn">⟳ Refresh Registered List</button>

    <div class="refresh-info">
        🔄 Live game updates via WebSocket · Registered list on demand
    </div>
    <div class="footer">
        Admin only | <span id="timestamp"></span>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const adminSecret = urlParams.get('secret');
    if (!adminSecret) {
        document.body.innerHTML = '<div style="color:red; text-align:center; margin-top:50px; padding:20px;">❌ Access denied: missing secret parameter.<br><br>Use: /admin/live-players?secret=YOUR_SECRET</div>';
        throw new Error('No secret');
    }

    const socket = io('/admin', { query: { secret: adminSecret } });

    // ------------------ Live players ------------------
    socket.on('connect', () => {
        console.log('Admin socket connected');
    });

    socket.on('connect_error', (err) => {
        console.error('Socket error:', err.message);
        document.getElementById('playersTableBody').innerHTML = 
            '<tr><td colspan="3" class="empty-message" style="color:#e74c3c;">⚠️ WebSocket failed.</td></tr>';
    });

    socket.on('admin:playersList', (data) => {
        updateLivePlayers(data.players);
        document.getElementById('gameState').innerText = data.gameStatus || 'unknown';
    });

    function updateLivePlayers(players) {
        const tbody = document.getElementById('playersTableBody');
        document.getElementById('playerCount').innerText = players ? players.length : 0;

        if (!players || players.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty-message">👻 No players in game.</td></tr>';
            return;
        }

        let html = '';
        players.forEach(p => {
            const username = escapeHtml(p.username);
            const telegramId = escapeHtml(p.telegramId);
            const tgLink = `tg://user?id=${telegramId}`;
            html += `
                <tr class="player-row">
                    <td><a href="${tgLink}" class="username-link" target="_blank" rel="noopener noreferrer">📱 ${username}</a></td>
                    <td><span class="telegram-id">${telegramId}</span></td>
                    <td><span class="card-badge">#${p.cardNumber}</span></td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
    }

    document.getElementById('refreshBtn').addEventListener('click', () => {
        socket.emit('admin:requestPlayers');
        if (navigator.vibrate) navigator.vibrate(50);
    });

    // ---------------- Registered players (new) ----------------
    function loadRegisteredPlayers() {
        document.getElementById('registeredTableBody').innerHTML = 
            '<tr><td colspan="3" class="empty-message">⏳ Loading…</td></tr>';
        
        // Request all registered users via socket
        socket.emit('admin:getAllRegisteredPlayers');
    }

    socket.on('admin:allRegisteredPlayers', (data) => {
        updateRegisteredTable(data.users);
    });

    function updateRegisteredTable(users) {
        const tbody = document.getElementById('registeredTableBody');
        document.getElementById('registeredCount').innerText = users ? users.length : 0;

        if (!users || users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty-message">No registered users found.</td></tr>';
            return;
        }

        let html = '';
        users.forEach(user => {
            const telegramId = escapeHtml(user.telegramId);
            const username = escapeHtml(user.username) || 'no username';
            const balance = user.balance || 0;
            const balanceClass = balance > 0 ? 'balance-positive' : 'balance-zero';

            html += `
                <tr class="player-row">
                    <td><span class="telegram-id">${telegramId}</span></td>
                    <td>${username}</td>
                    <td><span class="${balanceClass}">${balance.toLocaleString()}</span></td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
    }

    document.getElementById('refreshRegisteredBtn').addEventListener('click', () => {
        loadRegisteredPlayers();
        if (navigator.vibrate) navigator.vibrate(50);
    });

    // Load registered list on page start
    loadRegisteredPlayers();

    // --------------- Helpers ---------------
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    setInterval(() => {
        document.getElementById('timestamp').innerText = new Date().toLocaleString();
    }, 1000);
</script>
</body>
</html>
