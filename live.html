<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Admin Live Players | Bingo</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1e2a3a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 12px;
            margin: 0;
            color: #ecf0f1;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #0f1724;
            border-radius: 28px;
            padding: 18px 12px 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 8px 0;
            text-align: center;
            border-bottom: 2px solid #f39c12;
            width: 100%;
            padding-bottom: 10px;
        }

        .status-bar {
            background: #2c3e50;
            border-radius: 40px;
            padding: 12px 18px;
            margin: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        .game-status {
            background: #e67e22;
            padding: 6px 16px;
            border-radius: 40px;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .players-table-wrapper {
            background: #1a2533;
            border-radius: 24px;
            padding: 4px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 280px;
        }

        th {
            text-align: left;
            padding: 12px 8px;
            background: #0f1724;
            color: #f39c12;
            font-weight: bold;
            border-bottom: 2px solid #f39c12;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #2c3e50;
            vertical-align: middle;
        }

        .player-row:active {
            background: #2c3e50;
        }

        .username-link {
            color: #f39c12;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .username-link:active {
            opacity: 0.7;
        }

        .telegram-id {
            font-family: monospace;
            font-size: 0.75rem;
            background: #0f1724;
            padding: 4px 6px;
            border-radius: 8px;
            display: inline-block;
        }

        .card-badge {
            background: #f39c12;
            color: #1e2a3a;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.75rem;
            display: inline-block;
            text-align: center;
        }

        .empty-message {
            text-align: center;
            padding: 48px 20px;
            color: #95a5a6;
            font-style: italic;
        }

        .refresh-info {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #7f8c8d;
        }

        button {
            background: #f39c12;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 18px;
            width: 100%;
            transition: 0.1s;
            color: #1e2a3a;
        }

        button:active {
            transform: scale(0.97);
            background: #e67e22;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.65rem;
            color: #5d6d7e;
        }

        /* small screen adjustments */
        @media (max-width: 500px) {
            th, td {
                padding: 10px 6px;
            }
            .telegram-id {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👥 Live Bingo Players</h1>
    <div class="status-bar">
        <span>🎮 Game state:</span>
        <span id="gameState" class="game-status">Loading...</span>
    </div>
    <div class="status-bar">
        <span>👤 Players in game:</span>
        <span id="playerCount">0</span>
    </div>

    <div class="players-table-wrapper">
        <table id="playersTable">
            <thead>
                <tr>
                    <th>👤 Username</th>
                    <th>🆔 Telegram ID</th>
                    <th>🎴 Card</th>
                </tr>
            </thead>
            <tbody id="playersTableBody">
                <tr><td colspan="3" class="empty-message">No players yet. Wait for lobby/game.</td></tr>
            </tbody>
        </table>
    </div>

    <button id="refreshBtn">⟳ Refresh now</button>
    <div class="refresh-info">
        🔄 Real‑time updates via WebSocket (automatic)
    </div>
    <div class="footer">
        Admin only | <span id="timestamp"></span>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const adminSecret = urlParams.get('secret');
    if (!adminSecret) {
        document.body.innerHTML = '<div style="color:red; text-align:center; margin-top:50px; padding:20px;">❌ Access denied: missing secret parameter.<br><br>Use: /admin/live-players?secret=YOUR_SECRET</div>';
        throw new Error('No secret');
    }

    const socket = io('/admin', { query: { secret: adminSecret } });

    socket.on('connect', () => {
        console.log('Admin socket connected');
    });

    socket.on('connect_error', (err) => {
        console.error('Socket error:', err.message);
        const tbody = document.getElementById('playersTableBody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="3" class="empty-message" style="color:#e74c3c;">⚠️ WebSocket failed.<br>Check server & secret.</td></tr>';
    });

    socket.on('admin:playersList', (data) => {
        updatePlayersTable(data.players);
        document.getElementById('gameState').innerText = data.gameStatus || 'unknown';
    });

    function updatePlayersTable(players) {
        const tbody = document.getElementById('playersTableBody');
        const countSpan = document.getElementById('playerCount');
        countSpan.innerText = players ? players.length : 0;

        if (!players || players.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty-message">👻 No players currently in the game.</td></tr>';
            return;
        }

        let html = '';
        players.forEach(p => {
            const username = escapeHtml(p.username);
            const telegramId = escapeHtml(p.telegramId);
            const cardNum = p.cardNumber;
            // Telegram deep link (works on mobile if Telegram installed)
            const tgLink = `tg://user?id=${telegramId}`;
            html += `
                <tr class="player-row">
                    <td>
                        <a href="${tgLink}" class="username-link" target="_blank" rel="noopener noreferrer">
                            📱 ${username}
                        </a>
                    </td>
                    <td><span class="telegram-id">${telegramId}</span></td>
                    <td><span class="card-badge">#${cardNum}</span></td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('refreshBtn').addEventListener('click', () => {
        socket.emit('admin:requestPlayers');
        if (navigator.vibrate) navigator.vibrate(50);
    });

    setInterval(() => {
        document.getElementById('timestamp').innerText = new Date().toLocaleString();
    }, 1000);
</script>
</body>
</html>
