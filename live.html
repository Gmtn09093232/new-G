<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Admin Live Players | Bingo</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1e2a3a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 12px;
            margin: 0;
            color: #ecf0f1;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #0f1724;
            border-radius: 28px;
            padding: 18px 16px 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 8px 0;
            text-align: center;
            border-bottom: 2px solid #f39c12;
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
            letter-spacing: -0.3px;
        }

        .status-bar {
            background: #2c3e50;
            border-radius: 40px;
            padding: 12px 18px;
            margin: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.95rem;
            flex-wrap: wrap;
            gap: 8px;
        }

        .game-status {
            background: #e67e22;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .players-list {
            background: #1a2533;
            border-radius: 24px;
            padding: 8px;
            max-height: 65vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .player-card {
            background: #2c3e50;
            margin: 10px 0;
            padding: 14px 18px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            gap: 12px;
            flex-wrap: wrap;
        }

        .player-card:active {
            background: #3e5a6f;
            transform: scale(0.99);
        }

        .username {
            font-size: 1.1rem;
            font-weight: bold;
            word-break: break-word;
            flex: 2;
            min-width: 120px;
        }

        .card-num {
            background: #f39c12;
            color: #1e2a3a;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .empty-message {
            text-align: center;
            padding: 48px 20px;
            color: #95a5a6;
            font-style: italic;
            font-size: 1rem;
        }

        .refresh-info {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 20px;
            color: #7f8c8d;
        }

        button {
            background: #f39c12;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 18px;
            width: 100%;
            transition: 0.2s;
            color: #1e2a3a;
            font-weight: 800;
        }

        button:active {
            background: #e67e22;
            transform: scale(0.97);
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #5d6d7e;
        }

        /* Scrollbar styling (optional) */
        .players-list::-webkit-scrollbar {
            width: 4px;
        }
        .players-list::-webkit-scrollbar-track {
            background: #1a2533;
        }
        .players-list::-webkit-scrollbar-thumb {
            background: #f39c12;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👥 Live Bingo Players</h1>
    <div class="status-bar">
        <span>🎮 Game state:</span>
        <span id="gameState" class="game-status">Loading...</span>
    </div>
    <div class="status-bar">
        <span>👤 Players in game:</span>
        <span id="playerCount">0</span>
    </div>
    <div class="players-list" id="playersListContainer">
        <div class="empty-message">No players yet. Wait for lobby/game.</div>
    </div>
    <button id="refreshBtn">⟳ Refresh now</button>
    <div class="refresh-info">
        🔄 Real‑time updates via WebSocket (automatic)
    </div>
    <div class="footer">
        Admin only | <span id="timestamp"></span>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const adminSecret = urlParams.get('secret');
    if (!adminSecret) {
        document.body.innerHTML = '<div style="color:red; text-align:center; margin-top:50px; padding:20px;">❌ Access denied: missing secret parameter.<br><br>Use: /admin/live-players?secret=YOUR_SECRET</div>';
        throw new Error('No secret');
    }

    const socket = io('/admin', { query: { secret: adminSecret } });

    socket.on('connect', () => {
        console.log('Admin socket connected');
    });

    socket.on('connect_error', (err) => {
        console.error('Socket error:', err.message);
        document.getElementById('playersListContainer').innerHTML = 
            '<div class="empty-message" style="color:#e74c3c;">⚠️ WebSocket connection failed.<br>Check server and secret.</div>';
    });

    socket.on('admin:playersList', (data) => {
        updatePlayersList(data.players);
        document.getElementById('gameState').innerText = data.gameStatus || 'unknown';
    });

    function updatePlayersList(players) {
        const container = document.getElementById('playersListContainer');
        const countSpan = document.getElementById('playerCount');
        countSpan.innerText = players.length;
        
        if (!players || players.length === 0) {
            container.innerHTML = '<div class="empty-message">👻 No players currently in the game.</div>';
            return;
        }
        
        let html = '';
        players.forEach(p => {
            html += `
                <div class="player-card">
                    <span class="username">${escapeHtml(p.username)}</span>
                    <span class="card-num">🎴 #${p.cardNumber}</span>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('refreshBtn').addEventListener('click', () => {
        socket.emit('admin:requestPlayers');
        // Provide haptic feedback on supported devices (optional)
        if (navigator.vibrate) navigator.vibrate(50);
    });
    
    setInterval(() => {
        document.getElementById('timestamp').innerText = new Date().toLocaleString();
    }, 1000);
</script>
</body>
</html>
