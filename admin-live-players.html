<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Live Players | Bingo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #1e2a3a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
            color: #ecf0f1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #0f1724;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid #f39c12;
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }
        .status-bar {
            background: #2c3e50;
            border-radius: 12px;
            padding: 12px 16px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .game-status {
            background: #e67e22;
            padding: 5px 12px;
            border-radius: 30px;
            color: white;
        }
        .players-list {
            background: #1a2533;
            border-radius: 16px;
            padding: 10px;
            max-height: 500px;
            overflow-y: auto;
        }
        .player-card {
            background: #2c3e50;
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .player-card:hover {
            background: #3e5a6f;
        }
        .username {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .card-num {
            background: #f39c12;
            color: #1e2a3a;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
            font-style: italic;
        }
        .refresh-info {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 20px;
            color: #7f8c8d;
        }
        button {
            background: #f39c12;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background: #e67e22;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.7rem;
            color: #5d6d7e;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👥 Live Bingo Players</h1>
    <div class="status-bar">
        <span>🎮 Game state:</span>
        <span id="gameState" class="game-status">Loading...</span>
    </div>
    <div class="status-bar">
        <span>👤 Players in game:</span>
        <span id="playerCount">0</span>
    </div>
    <div class="players-list" id="playersListContainer">
        <div class="empty-message">No players yet. Wait for lobby/game.</div>
    </div>
    <button id="refreshBtn">⟳ Refresh now</button>
    <div class="refresh-info">
        🔄 Real‑time updates via WebSocket (automatic)
    </div>
    <div class="footer">
        Admin only | <span id="timestamp"></span>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const adminSecret = urlParams.get('secret');
    if (!adminSecret) {
        document.body.innerHTML = '<div style="color:red; text-align:center; margin-top:50px;">❌ Access denied: missing secret parameter.</div>';
        throw new Error('No secret');
    }

    const socket = io('/admin', { query: { secret: adminSecret } });

    socket.on('connect', () => {
        console.log('Admin socket connected');
    });

    socket.on('connect_error', (err) => {
        console.error('Socket error:', err.message);
        document.getElementById('playersListContainer').innerHTML = 
            '<div class="empty-message" style="color:#e74c3c;">⚠️ WebSocket connection failed. Check server and secret.</div>';
    });

    socket.on('admin:playersList', (data) => {
        updatePlayersList(data.players);
        document.getElementById('gameState').innerText = data.gameStatus || 'unknown';
    });

    function updatePlayersList(players) {
        const container = document.getElementById('playersListContainer');
        const countSpan = document.getElementById('playerCount');
        countSpan.innerText = players.length;
        
        if (!players || players.length === 0) {
            container.innerHTML = '<div class="empty-message">👻 No players currently in the game.</div>';
            return;
        }
        
        let html = '';
        players.forEach(p => {
            html += `
                <div class="player-card">
                    <span class="username">${escapeHtml(p.username)}</span>
                    <span class="card-num">Card #${p.cardNumber}</span>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('refreshBtn').addEventListener('click', () => {
        socket.emit('admin:requestPlayers');
    });
    
    setInterval(() => {
        document.getElementById('timestamp').innerText = new Date().toLocaleString();
    }, 1000);
</script>
</body>
</html>
