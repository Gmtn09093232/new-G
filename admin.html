<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 Bingo Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1c;
      color: #eee;
      padding: 16px;
      margin: 0;
    }
    .container { max-width: 1400px; margin: auto; }
    h1 { color: #f39c12; font-size: 1.8rem; }
    .section {
      background: #16202a;
      margin: 20px 0;
      padding: 20px;
      border-radius: 24px;
      overflow: hidden;
    }
    .request-card {
      background: #1e2a36;
      border-radius: 16px;
      margin: 12px 0;
      padding: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: flex-start;
      justify-content: space-between;
    }
    .request-info { flex: 1 1 65%; min-width: 250px; }
    .request-info p { margin: 5px 0; word-break: break-word; }
    .proof-img {
      max-width: 100%;
      height: auto;
      max-height: 120px;
      border-radius: 8px;
      border: 1px solid #f39c12;
      margin-top: 8px;
    }
    button {
      background: #f39c12;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin: 5px 0;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    button.approve { background: #2ecc71; color: #000; }
    button.reject { background: #e74c3c; color: #fff; }
    .refresh { background: #3498db; color: #fff; margin-bottom: 20px; }
    .receipt-box {
      background: #0f1a24;
      padding: 10px;
      border-radius: 12px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 0.85rem;
      word-break: break-all;
    }
    .match { color: #2ecc71; font-weight: bold; }
    .mismatch { color: #e74c3c; font-weight: bold; }
    .nav-link { color: #f39c12; font-weight: bold; margin-left: 20px; font-size: 0.9rem; }
    select, input {
      background: #1e2a36;
      border: 1px solid #334;
      color: #eee;
      padding: 10px;
      border-radius: 8px;
      margin-right: 10px;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    /* Mobile optimisations */
    @media (max-width: 600px) {
      body { padding: 8px; }
      h1 { font-size: 1.4rem; }
      .section { padding: 12px; border-radius: 16px; }
      .request-card { flex-direction: column; }
      .request-info { width: 100%; }
      .action-buttons { width: 100%; justify-content: flex-start; }
      button {
        padding: 10px 16px;
        font-size: 0.85rem;
        width: auto;
        flex: 1 1 auto;
      }
      .refresh { width: 100%; }
      #addBalanceSection input {
        width: 100%;
        margin-bottom: 10px;
      }
      #addBalanceSection button {
        width: 100%;
      }
      select, input { width: 100%; margin-right: 0; }
      .filter-row { flex-direction: column; align-items: flex-start; }
      .proof-img { max-width: 100%; max-height: 150px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎰 Bingo Admin Panel <a href="audit.html" class="nav-link"></a></h1>
  <button class="refresh" onclick="fetchAll()">🔄 Refresh All</button>

  <!-- Deposit Section -->
  <div class="section">
    <h2>📸 Pending Deposit Requests</h2>
    <div class="filter-row">
      <label for="depositFilter">Filter by method:</label>
      <select id="depositFilter" onchange="renderDeposits()">
        <option value="all">All</option>
        <option value="telebirr">Telebirr</option>
        <option value="cbebirr">CBE Birr</option>
        <option value="mpesa">M‑Pesa</option>
      </select>
    </div>
    <div id="depositList">Loading...</div>
  </div>

  <!-- Withdrawal Section -->
  <div class="section">
    <h2>💰 Pending Withdrawal Requests</h2>
    <div class="filter-row">
      <label for="withdrawFilter">Filter by method:</label>
      <select id="withdrawFilter" onchange="renderWithdrawals()">
        <option value="all">All</option>
        <option value="telebirr">Telebirr</option>
        <option value="cbebirr">CBE Birr</option>
        <option value="mpesa">M‑Pesa</option>
      </select>
    </div>
    <div id="withdrawList">Loading...</div>
  </div>

  <div class="section" id="addBalanceSection">
    <h2>➕ Manual Add Balance</h2>
    <input type="text" id="userId" placeholder="Telegram ID (numeric)">
    <input type="number" id="amount" placeholder="Amount">
    <button onclick="addBalance()">Add Balance</button>
  </div>
</div>

<script>
  const ADMIN_SECRET = prompt("Enter admin secret:") || "your_secret_here";
  const API_BASE = '';

  // ---------- QR Code scanning ----------
  function extractRefFromQR(imageSrc) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.src = imageSrc;
      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qrCode = jsQR(imageData.data, canvas.width, canvas.height);
        if (qrCode && qrCode.data) {
          const data = qrCode.data;
          const match = data.match(/\/receipt\/([A-Z0-9]+)/i);
          if (match) {
            resolve(match[1]);
          } else {
            const refMatch = data.match(/^([A-Z0-9]{8,})$/);
            if (refMatch) resolve(refMatch[1]);
            else resolve(null);
          }
        } else {
          resolve(null);
        }
      };
      img.onerror = () => reject('Failed to load image for QR scan');
    });
  }

  // ---------- OCR fallback ----------
  async function extractRefFromOCR(imageUrl) {
    try {
      const { data: { text } } = await Tesseract.recognize(imageUrl, 'eng');
      const match = text.match(/Transaction\s*Number\s*:\s*([A-Z0-9]+)/i);
      if (match && match[1]) return match[1].trim();
      const fallback = text.match(/\bDE[A-Z0-9]{8,}\b/i);
      return fallback ? fallback[0] : null;
    } catch {
      return null;
    }
  }

  // ---------- Unified reference extraction ----------
  async function getReferenceFromProof(imagePath) {
    try {
      const qrRef = await extractRefFromQR(imagePath);
      if (qrRef) return { ref: qrRef, method: 'QR' };
    } catch (e) { console.warn('QR scan failed, trying OCR', e); }
    const ocrRef = await extractRefFromOCR(imagePath);
    if (ocrRef) return { ref: ocrRef, method: 'OCR' };
    return null;
  }

  // ---------- Verification link builder ----------
  function getVerificationLink(paymentType, referenceNumber) {
    const ref = encodeURIComponent(referenceNumber);
    switch (paymentType) {
      case 'telebirr':
        return `https://transactioninfo.ethiotelecom.et/receipt/${ref}`;
      case 'cbebirr':
        return `https://cbebirr.com/verify?txn=${ref}`; // replace with real URL
      case 'mpesa':
        return `https://mpesa.ethiotelecom.et/transaction/${ref}`; // replace with real URL
      default:
        return null;
    }
  }

  // ---------- Global data stores ----------
  let depositData = [];
  let withdrawalData = [];

  // ---------- UI rendering ----------
  async function fetchAll() {
    await fetchDeposits();
    await fetchWithdrawals();
  }

  async function fetchDeposits() {
    try {
      const res = await fetch(`${API_BASE}/admin/deposits?secret=${ADMIN_SECRET}`);
      const data = await res.json();
      depositData = data.requests || [];
      renderDeposits();
    } catch (err) {
      console.error(err);
      document.getElementById('depositList').innerHTML = '<p>Error loading deposits</p>';
    }
  }

  function renderDeposits() {
    const filter = document.getElementById('depositFilter').value;
    const container = document.getElementById('depositList');
    const filtered = filter === 'all' ? depositData : depositData.filter(req => req.payment_type === filter);

    if (filtered.length === 0) {
      container.innerHTML = '<p>✅ No pending deposits.</p>';
      return;
    }

    container.innerHTML = '';
    filtered.forEach(async (req) => {
      const card = document.createElement('div');
      card.className = 'request-card';

      const submittedRef = req.reference_number || '';
      const refHtml = submittedRef
        ? `<p><strong>Submitted Ref:</strong> ${submittedRef}</p>`
        : '';

      // Verification link from submitted reference
      let verifyLinkHtml = '';
      if (submittedRef) {
        const link = getVerificationLink(req.payment_type, submittedRef);
        if (link) {
          verifyLinkHtml = `<p><a href="${link}" target="_blank" rel="noopener noreferrer" style="color:#f39c12;">🔗 Verify on ${req.payment_type} site</a></p>`;
        }
      }

      card.innerHTML = `
        <div class="request-info">
          <p><strong>ID:</strong> ${req.id}</p>
          <p><strong>User:</strong> ${req.username} (${req.telegram_id})</p>
          <p><strong>Phone:</strong> ${req.phone || 'N/A'}</p>
          <p><strong>Amount:</strong> ${req.amount} ETB</p>
          <p><strong>Method:</strong> ${req.payment_type || 'Unknown'}</p>
          ${refHtml}
          ${verifyLinkHtml}
          <p><strong>Created:</strong> ${new Date(req.created_at).toLocaleString()}</p>
          ${req.proof_path
            ? `<img src="${req.proof_path}" id="proof-${req.id}" class="proof-img" onclick="window.open(this.src)">`
            : '<p>No proof</p>'}
          <div id="verify-${req.id}" class="receipt-box">⏳ Scanning proof...</div>
        </div>
        <div class="action-buttons">
          <button class="approve" onclick="processDeposit(${req.id}, 'approve')">✅ Approve</button>
          <button class="reject" onclick="processDeposit(${req.id}, 'reject')">❌ Reject</button>
        </div>
      `;

      container.appendChild(card);

      if (req.proof_path) {
        const verifyDiv = document.getElementById(`verify-${req.id}`);
        try {
          const result = await getReferenceFromProof(req.proof_path);
          if (result) {
            const ref = result.ref;
            const receiptUrl = `https://transactioninfo.ethiotelecom.et/receipt/${encodeURIComponent(ref)}`;
            let matchHtml = '';
            if (submittedRef && submittedRef.toUpperCase() === ref.toUpperCase()) {
              matchHtml = '<span class="match">✅ Matches submitted ref</span>';
            } else if (submittedRef) {
              matchHtml = `<span class="mismatch">❌ Does NOT match submitted (${submittedRef})</span>`;
            }
            verifyDiv.innerHTML = `
              <strong>🧾 Extracted (${result.method}):</strong> ${ref} ${matchHtml}<br>
              <a href="${receiptUrl}" target="_blank" rel="noopener noreferrer">📄 Official receipt</a>
            `;
          } else {
            verifyDiv.innerHTML = '❌ Could not read reference from image.';
          }
        } catch (e) {
          verifyDiv.innerHTML = '❌ Verification error.';
          console.error(e);
        }
      } else {
        const verifyDiv = document.getElementById(`verify-${req.id}`);
        if (verifyDiv) verifyDiv.innerHTML = 'No proof image to scan.';
      }
    });
  }

  async function fetchWithdrawals() {
    try {
      const res = await fetch(`${API_BASE}/admin/withdrawals?secret=${ADMIN_SECRET}`);
      const data = await res.json();
      withdrawalData = data.requests || [];
      renderWithdrawals();
    } catch (err) {
      console.error(err);
      document.getElementById('withdrawList').innerHTML = '<p>Error loading withdrawals</p>';
    }
  }

  function renderWithdrawals() {
    const filter = document.getElementById('withdrawFilter').value;
    const container = document.getElementById('withdrawList');
    const filtered = filter === 'all' ? withdrawalData : withdrawalData.filter(req => req.withdrawal_type === filter);

    if (filtered.length === 0) {
      container.innerHTML = '<p>✅ No pending withdrawals.</p>';
      return;
    }

    container.innerHTML = filtered.map(req => `
      <div class="request-card">
        <div class="request-info">
          <p><strong>ID:</strong> ${req.id}</p>
          <p><strong>User:</strong> ${req.username} (${req.telegram_id})</p>
          <p><strong>Phone:</strong> ${req.phone_number}</p>
          <p><strong>Name:</strong> ${req.receiver_name || 'N/A'}</p>
          <p><strong>Amount:</strong> ${req.amount} ETB</p>
          <p><strong>Method:</strong> ${req.withdrawal_type || 'N/A'}</p>
          <p><strong>Created:</strong> ${new Date(req.created_at).toLocaleString()}</p>
        </div>
        <div class="action-buttons">
          <button class="approve" onclick="processWithdrawal(${req.id}, 'approve')">✅ Approve</button>
          <button class="reject" onclick="processWithdrawal(${req.id}, 'reject')">❌ Reject</button>
        </div>
      </div>
    `).join('');
  }

  async function processDeposit(requestId, action) {
    if (!confirm(`Are you sure to ${action} this deposit?`)) return;
    try {
      const res = await fetch(`${API_BASE}/admin/process-deposit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, requestId, action })
      });
      const data = await res.json();
      alert(data.success ? `Deposit ${action}d successfully!` : (data.error || 'Error'));
      fetchDeposits();
    } catch (err) { alert(err.message); }
  }

  async function processWithdrawal(requestId, action) {
    if (!confirm(`Are you sure to ${action} this withdrawal?`)) return;
    try {
      const res = await fetch(`${API_BASE}/admin/process-withdrawal`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, requestId, action })
      });
      const data = await res.json();
      alert(data.success ? `Withdrawal ${action}d successfully!` : (data.error || 'Error'));
      fetchWithdrawals();
    } catch (err) { alert(err.message); }
  }

  async function addBalance() {
    const telegramId = document.getElementById('userId').value.trim();
    const amount = document.getElementById('amount').value.trim();
    if (!telegramId || !amount) { alert('Fill all fields'); return; }
    try {
      const res = await fetch(`${API_BASE}/admin/add-balance`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, telegramId, amount: Number(amount) })
      });
      const data = await res.json();
      alert(data.success ? `Added ${amount} to user. New balance: ${data.newBalance}` : (data.error || 'Error'));
    } catch (err) { alert(err.message); }
  }

  fetchAll();
  setInterval(fetchAll, 10000);
</script>
</body>
</html>
