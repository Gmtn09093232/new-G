<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>🎰 Bingo Admin | Mobile Classic</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f1c 0%, #050814 100%);
      color: #f0f3fa;
      padding: 16px 12px 40px;
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.4;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* glass header - mobile optimized */
    .glass-header {
      background: rgba(18, 25, 45, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(243, 156, 18, 0.3);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f39c12, #ffcc70);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    @media (max-width: 480px) {
      h1 { font-size: 1.25rem; white-space: normal; word-break: keep-all; }
      .glass-header { flex-direction: column; align-items: stretch; text-align: center; }
    }

    .refresh-btn {
      background: linear-gradient(95deg, #2c3e66, #1e2a3e);
      border: none;
      padding: 10px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }
    @media (min-width: 481px) {
      .refresh-btn { width: auto; }
    }
    .refresh-btn:active { transform: scale(0.96); }

    /* stats row - stacked on mobile */
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 1.8rem;
    }
    .stat-card {
      background: rgba(22, 32, 42, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 0.9rem 1.2rem;
      flex: 1 1 130px;
      min-width: 120px;
      border-left: 4px solid #f39c12;
      transition: 0.2s;
    }
    @media (max-width: 540px) {
      .stats-row { flex-direction: column; }
      .stat-card { width: 100%; text-align: center; border-left: none; border-top: 3px solid #f39c12; }
    }
    .stat-card span {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #cbd5e6;
    }
    .stat-card .number {
      font-size: 1.9rem;
      font-weight: 800;
      color: #f39c12;
      line-height: 1.2;
    }

    /* sections */
    .section {
      background: rgba(18, 28, 40, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 1.8rem;
      padding: 1.2rem 1rem;
      margin-bottom: 1.8rem;
      border: 1px solid rgba(243, 156, 18, 0.2);
      transition: 0.2s;
    }
    .section h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 4px solid #f39c12;
      padding-left: 12px;
    }
    @media (max-width: 480px) {
      .section h2 { font-size: 1.25rem; }
      .section { padding: 1rem; }
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.25);
      padding: 0.7rem 1rem;
      border-radius: 2rem;
      margin-bottom: 1.2rem;
    }
    .filter-row label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    select, input {
      background: #0f172ad9;
      border: 1px solid #334155;
      color: #f0f3fa;
      padding: 10px 16px;
      border-radius: 40px;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
      font-family: inherit;
    }
    select:focus, input:focus {
      border-color: #f39c12;
      box-shadow: 0 0 0 2px rgba(243,156,18,0.4);
    }
    @media (max-width: 520px) {
      .filter-row select, .filter-row input { flex: 1; width: 100%; }
      .filter-row { flex-direction: column; align-items: stretch; }
    }

    /* request cards - fully mobile adapted */
    .request-card {
      background: #0f172acc;
      border-radius: 1.5rem;
      margin: 1rem 0;
      padding: 1.2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-start;
      justify-content: space-between;
      border: 1px solid #2a3a4e;
      backdrop-filter: blur(4px);
      transition: 0.15s;
    }
    .request-card:hover {
      border-color: #f39c12aa;
      background: #121e2ecc;
    }
    .request-info {
      flex: 2;
      min-width: 200px;
      width: 100%;
    }
    .request-info p {
      margin: 6px 0;
      font-size: 0.85rem;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: baseline;
      word-break: break-word;
    }
    .proof-img {
      max-width: 100%;
      max-height: 110px;
      width: auto;
      height: auto;
      border-radius: 18px;
      border: 2px solid #f39c12;
      object-fit: cover;
      cursor: pointer;
      margin-top: 8px;
    }
    .receipt-box {
      background: #03060ecc;
      padding: 8px 10px;
      border-radius: 1rem;
      font-family: monospace;
      font-size: 0.75rem;
      margin-top: 10px;
      word-break: break-all;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      width: 100%;
    }
    @media (min-width: 550px) {
      .action-buttons { width: auto; flex-wrap: nowrap; }
      .request-card { flex-direction: row; }
    }
    @media (max-width: 549px) {
      .request-card { flex-direction: column; }
      .action-buttons { justify-content: stretch; }
      .action-buttons button { flex: 1; justify-content: center; }
    }

    button {
      background: #f39c12;
      border: none;
      padding: 10px 18px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.12s linear;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    button:active { transform: scale(0.96); }
    button.approve { background: #2ecc71; color: #001e0f; }
    button.reject { background: #e74c3c; color: white; }
    .match { color: #2ecc71; font-weight: bold; }
    .mismatch { color: #e74c3c; font-weight: bold; }

    /* manual balance - stacked on mobile */
    .balance-card {
      background: linear-gradient(125deg, #0e1a24, #050f18);
      border-radius: 1.8rem;
      padding: 1.2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }
    .balance-field {
      flex: 1;
      min-width: 140px;
    }
    .balance-field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #f39c12;
    }
    .balance-field input {
      width: 100%;
      background: #010b14;
      border-radius: 2rem;
      font-size: 0.95rem;
    }
    .add-btn {
      background: #f39c12;
      color: #0f172a;
      font-weight: 800;
      padding: 10px 24px;
      width: 100%;
      justify-content: center;
    }
    @media (min-width: 540px) {
      .balance-card { flex-wrap: nowrap; }
      .add-btn { width: auto; }
    }
    .info-note {
      font-size: 0.65rem;
      background: #f39c1222;
      display: inline-block;
      padding: 3px 10px;
      border-radius: 40px;
      margin-top: 8px;
    }

    #balanceFeedback {
      margin-top: 12px;
      font-size: 0.75rem;
      background: #00000030;
      padding: 8px 12px;
      border-radius: 2rem;
    }
    a {
      color: #f39c12;
      text-decoration: none;
      word-break: break-all;
    }
    /* improved touch targets */
    button, .refresh-btn, select, input, .proof-img {
      touch-action: manipulation;
    }
    .proof-img:active { opacity: 0.8; }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-header">
    <h1>🎲 BINGO ADMIN · CLASSIC</h1>
    <button class="refresh-btn" onclick="fetchAll()">⟳ Refresh Dashboard</button>
  </div>

  <!-- live stats -->
  <div class="stats-row" id="statsPanel">
    <div class="stat-card"><span>📥 pending deposits</span><div class="number" id="pendingDepositCount">0</div></div>
    <div class="stat-card"><span>💸 pending withdrawals</span><div class="number" id="pendingWithdrawCount">0</div></div>
    <div class="stat-card"><span>🕒 last refresh</span><div class="number" id="lastRefresh">--:--:--</div></div>
  </div>

  <!-- Deposit Section -->
  <div class="section">
    <h2>📸 Deposit verifications</h2>
    <div class="filter-row">
      <label>🔍 Filter by method:</label>
      <select id="depositFilter" onchange="renderDeposits()">
        <option value="all">All methods</option>
        <option value="telebirr">Telebirr</option>
        <option value="cbebirr">CBE Birr</option>
        <option value="mpesa">M‑Pesa</option>
      </select>
    </div>
    <div id="depositList">Loading deposits...</div>
  </div>

  <!-- Withdrawal Section -->
  <div class="section">
    <h2>💰 Withdrawal requests</h2>
    <div class="filter-row">
      <label>🔍 Filter by method:</label>
      <select id="withdrawFilter" onchange="renderWithdrawals()">
        <option value="all">All methods</option>
        <option value="telebirr">Telebirr</option>
        <option value="cbebirr">CBE Birr</option>
        <option value="mpesa">M‑Pesa</option>
      </select>
    </div>
    <div id="withdrawList">Loading withdrawals...</div>
  </div>

  <!-- Manual Add Balance (numeric Telegram ID only) -->
  <div class="section">
    <h2>⚡ Manual balance injection</h2>
    <div class="balance-card">
      <div class="balance-field">
        <label>🆔 Telegram ID (numeric only)</label>
        <input type="text" id="userId" placeholder="123456789" inputmode="numeric" pattern="\d*">
        <div class="info-note">🔢 accepts numeric Telegram ID only</div>
      </div>
      <div class="balance-field">
        <label>💰 Amount (ETB)</label>
        <input type="number" id="amount" placeholder="Enter amount" step="1" min="1" inputmode="numeric">
      </div>
      <div class="balance-field">
        <label>&nbsp;</label>
        <button class="add-btn" onclick="addBalance()">➕ Add balance</button>
      </div>
    </div>
    <div id="balanceFeedback" style="margin-top: 12px; font-size:0.8rem;"></div>
  </div>
</div>

<script>
  const ADMIN_SECRET = prompt("🔐 Enter admin secret:") || "your_secret_here";
  const API_BASE = '';

  let depositData = [], withdrawalData = [];

  // ---------- QR & OCR Helpers ----------
  function extractRefFromQR(imageSrc) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "Anonymous";
      img.src = imageSrc;
      img.onload = function() {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const qrCode = jsQR(imageData.data, canvas.width, canvas.height);
          if (qrCode && qrCode.data) {
            const data = qrCode.data;
            const match = data.match(/\/receipt\/([A-Z0-9]+)/i);
            if (match) resolve(match[1]);
            else {
              const refMatch = data.match(/^([A-Z0-9]{8,})$/);
              resolve(refMatch ? refMatch[1] : null);
            }
          } else resolve(null);
        } catch(e) { reject(e); }
      };
      img.onerror = () => reject('QR load failed');
    });
  }

  async function extractRefFromOCR(imageUrl) {
    try {
      const { data: { text } } = await Tesseract.recognize(imageUrl, 'eng');
      const match = text.match(/Transaction\s*Number\s*:\s*([A-Z0-9]+)/i);
      if (match && match[1]) return match[1].trim();
      const fallback = text.match(/\bDE[A-Z0-9]{8,}\b/i);
      return fallback ? fallback[0] : null;
    } catch { return null; }
  }

  async function getReferenceFromProof(imagePath) {
    try {
      const qrRef = await extractRefFromQR(imagePath);
      if (qrRef) return { ref: qrRef, method: 'QR' };
    } catch(e) { console.warn(e); }
    const ocrRef = await extractRefFromOCR(imagePath);
    if (ocrRef) return { ref: ocrRef, method: 'OCR' };
    return null;
  }

  function getVerificationLink(paymentType, referenceNumber) {
    const ref = encodeURIComponent(referenceNumber);
    switch(paymentType) {
      case 'telebirr': return `https://transactioninfo.ethiotelecom.et/receipt/${ref}`;
      case 'cbebirr': return `https://cbebirr.com/verify?txn=${ref}`;
      case 'mpesa': return `https://mpesa.ethiotelecom.et/transaction/${ref}`;
      default: return null;
    }
  }

  function updateStats() {
    document.getElementById('pendingDepositCount').innerText = depositData.length;
    document.getElementById('pendingWithdrawCount').innerText = withdrawalData.length;
    document.getElementById('lastRefresh').innerText = new Date().toLocaleTimeString();
  }

  async function fetchAll() {
    await Promise.all([fetchDeposits(), fetchWithdrawals()]);
    updateStats();
  }

  async function fetchDeposits() {
    try {
      const res = await fetch(`${API_BASE}/admin/deposits?secret=${ADMIN_SECRET}`);
      const data = await res.json();
      depositData = data.requests || [];
      renderDeposits();
    } catch(err) {
      document.getElementById('depositList').innerHTML = '<p>⚠️ Error loading deposits</p>';
    }
  }

  async function renderDeposits() {
    const filter = document.getElementById('depositFilter').value;
    const container = document.getElementById('depositList');
    const filtered = filter === 'all' ? depositData : depositData.filter(req => req.payment_type === filter);
    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding:20px; text-align:center;">✅ No pending deposits.</div>';
      return;
    }
    container.innerHTML = '';
    for (const req of filtered) {
      const card = document.createElement('div');
      card.className = 'request-card';
      const submittedRef = req.reference_number || '';
      const refHtml = submittedRef ? `<p><strong>🧾 Ref submitted:</strong> ${escapeHtml(submittedRef)}</p>` : '';
      let verifyLinkHtml = '';
      if (submittedRef) {
        const link = getVerificationLink(req.payment_type, submittedRef);
        if (link) verifyLinkHtml = `<p><a href="${link}" target="_blank" rel="noopener noreferrer">🔗 Verify on provider</a></p>`;
      }
      card.innerHTML = `
        <div class="request-info">
          <p><strong>📌 ID:</strong> ${req.id} &nbsp;| <strong>👤 User:</strong> ${escapeHtml(req.username)} (${req.telegram_id})</p>
          <p><strong>📞 Phone:</strong> ${req.phone || 'N/A'} &nbsp;| <strong>💵 Amount:</strong> ${req.amount} ETB &nbsp;| <strong>🏦 Method:</strong> ${req.payment_type}</p>
          ${refHtml}
          ${verifyLinkHtml}
          <p><strong>🕒 Created:</strong> ${new Date(req.created_at).toLocaleString()}</p>
          ${req.proof_path ? `<img src="${req.proof_path}" class="proof-img" alt="payment proof" onclick="window.open(this.src)">` : '<p>📎 No proof</p>'}
          <div id="verify-${req.id}" class="receipt-box">🔍 Scanning receipt...</div>
        </div>
        <div class="action-buttons">
          <button class="approve" onclick="processDeposit(${req.id}, 'approve')">✅ Approve</button>
          <button class="reject" onclick="processDeposit(${req.id}, 'reject')">❌ Reject</button>
        </div>
      `;
      container.appendChild(card);
      const verifyDiv = document.getElementById(`verify-${req.id}`);
      if (req.proof_path && verifyDiv) {
        try {
          const result = await getReferenceFromProof(req.proof_path);
          if (result) {
            const ref = result.ref;
            const receiptUrl = `https://transactioninfo.ethiotelecom.et/receipt/${encodeURIComponent(ref)}`;
            let matchHtml = '';
            if (submittedRef && submittedRef.toUpperCase() === ref.toUpperCase()) matchHtml = '<span class="match">✅ Matches ref</span>';
            else if (submittedRef) matchHtml = `<span class="mismatch">❌ mismatch (${escapeHtml(submittedRef)})</span>`;
            verifyDiv.innerHTML = `🧪 Extracted (${result.method}): <strong>${escapeHtml(ref)}</strong> ${matchHtml}<br><a href="${receiptUrl}" target="_blank" rel="noopener noreferrer">📄 Official receipt link</a>`;
          } else verifyDiv.innerHTML = '❌ Reference not readable from image.';
        } catch(e) { verifyDiv.innerHTML = '❌ Verification error.'; }
      } else if (verifyDiv) {
        verifyDiv.innerHTML = 'No proof uploaded.';
      }
    }
  }

  async function fetchWithdrawals() {
    try {
      const res = await fetch(`${API_BASE}/admin/withdrawals?secret=${ADMIN_SECRET}`);
      const data = await res.json();
      withdrawalData = data.requests || [];
      renderWithdrawals();
    } catch(err) {
      document.getElementById('withdrawList').innerHTML = '<p>Error loading withdrawals</p>';
    }
  }

  function renderWithdrawals() {
    const filter = document.getElementById('withdrawFilter').value;
    const container = document.getElementById('withdrawList');
    const filtered = filter === 'all' ? withdrawalData : withdrawalData.filter(req => req.withdrawal_type === filter);
    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding:20px; text-align:center;">✅ No pending withdrawals.</div>';
      return;
    }
    container.innerHTML = filtered.map(req => `
      <div class="request-card">
        <div class="request-info">
          <p><strong>📌 ID:</strong> ${req.id} | 👤 ${escapeHtml(req.username)} (${req.telegram_id})</p>
          <p>📞 ${escapeHtml(req.phone_number)} | 👤 Name: ${escapeHtml(req.receiver_name || 'N/A')}</p>
          <p>💰 ${req.amount} ETB | 🏦 ${req.withdrawal_type} | 🕒 ${new Date(req.created_at).toLocaleString()}</p>
        </div>
        <div class="action-buttons">
          <button class="approve" onclick="processWithdrawal(${req.id}, 'approve')">✅ Approve</button>
          <button class="reject" onclick="processWithdrawal(${req.id}, 'reject')">❌ Reject</button>
        </div>
      </div>
    `).join('');
  }

  async function processDeposit(requestId, action) {
    if (!confirm(`Confirm ${action} deposit #${requestId}?`)) return;
    try {
      const res = await fetch(`${API_BASE}/admin/process-deposit`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, requestId, action })
      });
      const data = await res.json();
      alert(data.success ? `✅ Deposit ${action}d` : (data.error || 'Error'));
      await fetchDeposits();
      updateStats();
    } catch(err) { alert(err.message); }
  }

  async function processWithdrawal(requestId, action) {
    if (!confirm(`Confirm ${action} withdrawal #${requestId}?`)) return;
    try {
      const res = await fetch(`${API_BASE}/admin/process-withdrawal`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, requestId, action })
      });
      const data = await res.json();
      alert(data.success ? `✅ Withdrawal ${action}d` : (data.error || 'Error'));
      await fetchWithdrawals();
      updateStats();
    } catch(err) { alert(err.message); }
  }

  // ADD BALANCE - numeric Telegram ID only
  async function addBalance() {
    const telegramId = document.getElementById('userId').value.trim();
    const amount = document.getElementById('amount').value.trim();
    const feedbackDiv = document.getElementById('balanceFeedback');
    if (!telegramId || !amount) {
      alert('❌ Please enter Telegram ID (numeric) and amount');
      return;
    }
    if (!/^\d+$/.test(telegramId)) {
      alert('❌ Telegram ID must be numeric only (e.g., 123456789)');
      return;
    }
    const amountNum = Number(amount);
    if (isNaN(amountNum) || amountNum <= 0) {
      alert('❌ Amount must be a positive number');
      return;
    }
    feedbackDiv.innerHTML = '⏳ Processing...';
    try {
      const res = await fetch(`${API_BASE}/admin/add-balance`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, telegramId, amount: amountNum })
      });
      const data = await res.json();
      if (data.success) {
        alert(`✅ Added ${amountNum} ETB to user ${telegramId}. New balance: ${data.newBalance}`);
        feedbackDiv.innerHTML = `✔️ Success: user ${telegramId} +${amountNum} ETB (new balance ${data.newBalance})`;
        document.getElementById('userId').value = '';
        document.getElementById('amount').value = '';
        await fetchAll();
      } else {
        alert(`❌ Error: ${data.error || 'unknown'}`);
        feedbackDiv.innerHTML = `⚠️ ${data.error || 'failed'}`;
      }
    } catch(err) {
      alert(err.message);
      feedbackDiv.innerHTML = '❌ Network error';
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  fetchAll();
  setInterval(() => { fetchAll(); }, 14000);
</script>
</body>
</html>
