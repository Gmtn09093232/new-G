<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>🎰 Bingo Admin | Compact Inline</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f1c 0%, #050814 100%);
      color: #f0f3fa;
      padding: 12px 10px 32px;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.4;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    /* header - compact */
    .glass-header {
      background: rgba(18, 25, 45, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(243, 156, 18, 0.3);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f39c12, #ffcc70);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    @media (max-width: 560px) {
      h1 { font-size: 1.1rem; white-space: normal; }
      .glass-header { flex-direction: column; align-items: stretch; text-align: center; }
    }

    .refresh-btn {
      background: linear-gradient(95deg, #2c3e66, #1e2a3e);
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .refresh-btn:active { transform: scale(0.96); }

    /* INLINE STATS ROW - all devices */
    .stats-row {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 8px;
      margin-bottom: 1.2rem;
      justify-content: space-between;
    }
    .stat-card {
      background: rgba(22, 32, 42, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 1.2rem;
      padding: 0.4rem 0.5rem;
      flex: 1;
      text-align: center;
      border-top: 3px solid #f39c12;
      transition: 0.2s;
      min-width: 0; /* allows shrinking */
    }
    .stat-card span {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #cbd5e6;
      display: block;
    }
    .stat-card .number {
      font-size: 1.3rem;
      font-weight: 800;
      color: #f39c12;
      line-height: 1.2;
    }
    /* ensure no stacking on very small screens */
    @media (max-width: 480px) {
      .stat-card span { font-size: 0.55rem; }
      .stat-card .number { font-size: 1.1rem; }
      .stat-card { padding: 0.3rem 0.3rem; }
    }

    /* sections */
    .section {
      background: rgba(18, 28, 40, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 0.8rem;
      margin-bottom: 1.2rem;
      border: 1px solid rgba(243, 156, 18, 0.2);
    }
    .section h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 6px;
      border-left: 4px solid #f39c12;
      padding-left: 10px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.25);
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      margin-bottom: 1rem;
    }
    .filter-row label { font-size: 0.7rem; }
    select, input {
      background: #0f172ad9;
      border: 1px solid #334155;
      color: #f0f3fa;
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      outline: none;
    }

    /* request cards */
    .request-card {
      background: #0f172acc;
      border-radius: 1.2rem;
      margin: 0.8rem 0;
      padding: 0.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: flex-start;
      justify-content: space-between;
      border: 1px solid #2a3a4e;
    }
    .request-info {
      flex: 2;
      min-width: 180px;
    }
    .request-info p {
      margin: 4px 0;
      font-size: 0.75rem;
    }
    .proof-img {
      max-width: 80px;
      max-height: 80px;
      border-radius: 12px;
      border: 1px solid #f39c12;
      cursor: pointer;
    }
    .receipt-box {
      background: #03060ecc;
      padding: 4px 8px;
      border-radius: 1rem;
      font-size: 0.7rem;
      margin-top: 6px;
    }
    .action-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      background: #f39c12;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
    }
    button.approve { background: #2ecc71; color: #001e0f; }
    button.reject { background: #e74c3c; color: white; }
    .match { color: #2ecc71; }
    .mismatch { color: #e74c3c; }

    /* balance card inline on desktop, stacked on mobile but compact */
    .balance-card {
      background: linear-gradient(125deg, #0e1a24, #050f18);
      border-radius: 1.5rem;
      padding: 0.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: flex-end;
    }
    .balance-field {
      flex: 1;
      min-width: 120px;
    }
    .balance-field label {
      font-size: 0.65rem;
      margin-bottom: 4px;
      color: #f39c12;
    }
    .balance-field input {
      width: 100%;
      padding: 6px 10px;
      font-size: 0.8rem;
    }
    .add-btn {
      background: #f39c12;
      color: #0f172a;
      font-weight: 800;
      padding: 6px 16px;
      width: 100%;
      justify-content: center;
    }
    @media (min-width: 540px) {
      .balance-card { flex-wrap: nowrap; }
      .add-btn { width: auto; }
    }
    .info-note { font-size: 0.6rem; margin-top: 4px; }
    #balanceFeedback { font-size: 0.7rem; margin-top: 8px; }
    a { color: #f39c12; word-break: break-all; }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-header">
    <h1>🎲 BINGO ADMIN</h1>
    <button class="refresh-btn" onclick="fetchAll()">⟳ Refresh</button>
  </div>

  <!-- inline stats row -->
  <div class="stats-row" id="statsPanel">
    <div class="stat-card"><span>📥 pending deposits</span><div class="number" id="pendingDepositCount">0</div></div>
    <div class="stat-card"><span>💸 pending withdrawals</span><div class="number" id="pendingWithdrawCount">0</div></div>
    <div class="stat-card"><span>🕒 last refresh</span><div class="number" id="lastRefresh">--:--:--</div></div>
  </div>

  <!-- Deposit Section -->
  <div class="section">
    <h2>📸 Deposit verifications</h2>
    <div class="filter-row">
      <label>🔍 Filter:</label>
      <select id="depositFilter" onchange="renderDeposits()">
        <option value="all">All</option>
        <option value="telebirr">Telebirr</option>
        <option value="cbebirr">CBE Birr</option>
        <option value="mpesa">M‑Pesa</option>
      </select>
    </div>
    <div id="depositList">Loading deposits...</div>
  </div>

  <!-- Withdrawal Section -->
  <div class="section">
    <h2>💰 Withdrawal requests</h2>
    <div class="filter-row">
      <label>🔍 Filter:</label>
      <select id="withdrawFilter" onchange="renderWithdrawals()">
        <option value="all">All</option>
        <option value="telebirr">Telebirr</option>
        <option value="cbebirr">CBE Birr</option>
        <option value="mpesa">M‑Pesa</option>
      </select>
    </div>
    <div id="withdrawList">Loading withdrawals...</div>
  </div>

  <!-- Manual Add Balance -->
  <div class="section">
    <h2>⚡ Manual balance</h2>
    <div class="balance-card">
      <div class="balance-field">
        <label>🆔 Telegram ID (numeric)</label>
        <input type="text" id="userId" placeholder="123456789" inputmode="numeric">
      </div>
      <div class="balance-field">
        <label>💰 Amount (ETB)</label>
        <input type="number" id="amount" placeholder="Amount" step="1" min="1">
      </div>
      <div class="balance-field">
        <label>&nbsp;</label>
        <button class="add-btn" onclick="addBalance()">➕ Add</button>
      </div>
    </div>
    <div id="balanceFeedback"></div>
  </div>
</div>

<script>
  const ADMIN_SECRET = prompt("🔐 Enter admin secret:") || "your_secret_here";
  const API_BASE = '';

  let depositData = [], withdrawalData = [];

  // QR & OCR functions (unchanged)
  function extractRefFromQR(imageSrc) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "Anonymous";
      img.src = imageSrc;
      img.onload = function() {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const qrCode = jsQR(imageData.data, canvas.width, canvas.height);
          if (qrCode && qrCode.data) {
            const data = qrCode.data;
            const match = data.match(/\/receipt\/([A-Z0-9]+)/i);
            if (match) resolve(match[1]);
            else {
              const refMatch = data.match(/^([A-Z0-9]{8,})$/);
              resolve(refMatch ? refMatch[1] : null);
            }
          } else resolve(null);
        } catch(e) { reject(e); }
      };
      img.onerror = () => reject('QR load failed');
    });
  }

  async function extractRefFromOCR(imageUrl) {
    try {
      const { data: { text } } = await Tesseract.recognize(imageUrl, 'eng');
      const match = text.match(/Transaction\s*Number\s*:\s*([A-Z0-9]+)/i);
      if (match && match[1]) return match[1].trim();
      const fallback = text.match(/\bDE[A-Z0-9]{8,}\b/i);
      return fallback ? fallback[0] : null;
    } catch { return null; }
  }

  async function getReferenceFromProof(imagePath) {
    try {
      const qrRef = await extractRefFromQR(imagePath);
      if (qrRef) return { ref: qrRef, method: 'QR' };
    } catch(e) { console.warn(e); }
    const ocrRef = await extractRefFromOCR(imagePath);
    if (ocrRef) return { ref: ocrRef, method: 'OCR' };
    return null;
  }

  function getVerificationLink(paymentType, referenceNumber) {
    const ref = encodeURIComponent(referenceNumber);
    switch(paymentType) {
      case 'telebirr': return `https://transactioninfo.ethiotelecom.et/receipt/${ref}`;
      case 'cbebirr': return `https://cbebirr.com/verify?txn=${ref}`;
      case 'mpesa': return `https://mpesa.ethiotelecom.et/transaction/${ref}`;
      default: return null;
    }
  }

  function updateStats() {
    document.getElementById('pendingDepositCount').innerText = depositData.length;
    document.getElementById('pendingWithdrawCount').innerText = withdrawalData.length;
    document.getElementById('lastRefresh').innerText = new Date().toLocaleTimeString();
  }

  async function fetchAll() {
    await Promise.all([fetchDeposits(), fetchWithdrawals()]);
    updateStats();
  }

  async function fetchDeposits() {
    try {
      const res = await fetch(`${API_BASE}/admin/deposits?secret=${ADMIN_SECRET}`);
      const data = await res.json();
      depositData = data.requests || [];
      renderDeposits();
    } catch(err) {
      document.getElementById('depositList').innerHTML = '<p>⚠️ Error loading deposits</p>';
    }
  }

  async function renderDeposits() {
    const filter = document.getElementById('depositFilter').value;
    const container = document.getElementById('depositList');
    const filtered = filter === 'all' ? depositData : depositData.filter(req => req.payment_type === filter);
    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding:12px; text-align:center;">✅ No pending deposits.</div>';
      return;
    }
    container.innerHTML = '';
    for (const req of filtered) {
      const card = document.createElement('div');
      card.className = 'request-card';
      const submittedRef = req.reference_number || '';
      const refHtml = submittedRef ? `<p><strong>🧾 Ref:</strong> ${escapeHtml(submittedRef)}</p>` : '';
      let verifyLinkHtml = '';
      if (submittedRef) {
        const link = getVerificationLink(req.payment_type, submittedRef);
        if (link) verifyLinkHtml = `<p><a href="${link}" target="_blank">🔗 Verify</a></p>`;
      }
      card.innerHTML = `
        <div class="request-info">
          <p><strong>📌 ID:</strong> ${req.id} | 👤 ${escapeHtml(req.username)} (${req.telegram_id})</p>
          <p>📞 ${req.phone || 'N/A'} | 💵 ${req.amount} ETB | 🏦 ${req.payment_type}</p>
          ${refHtml}
          ${verifyLinkHtml}
          <p>🕒 ${new Date(req.created_at).toLocaleString()}</p>
          ${req.proof_path ? `<img src="${req.proof_path}" class="proof-img" onclick="window.open(this.src)">` : '<p>📎 No proof</p>'}
          <div id="verify-${req.id}" class="receipt-box">🔍 Scanning...</div>
        </div>
        <div class="action-buttons">
          <button class="approve" onclick="processDeposit(${req.id}, 'approve')">✅ Approve</button>
          <button class="reject" onclick="processDeposit(${req.id}, 'reject')">❌ Reject</button>
        </div>
      `;
      container.appendChild(card);
      const verifyDiv = document.getElementById(`verify-${req.id}`);
      if (req.proof_path && verifyDiv) {
        try {
          const result = await getReferenceFromProof(req.proof_path);
          if (result) {
            const ref = result.ref;
            const receiptUrl = `https://transactioninfo.ethiotelecom.et/receipt/${encodeURIComponent(ref)}`;
            let matchHtml = '';
            if (submittedRef && submittedRef.toUpperCase() === ref.toUpperCase()) matchHtml = '<span class="match">✅ Matches</span>';
            else if (submittedRef) matchHtml = `<span class="mismatch">❌ mismatch</span>`;
            verifyDiv.innerHTML = `🧪 Extracted (${result.method}): <strong>${escapeHtml(ref)}</strong> ${matchHtml}<br><a href="${receiptUrl}" target="_blank">📄 Receipt link</a>`;
          } else verifyDiv.innerHTML = '❌ Reference not readable';
        } catch(e) { verifyDiv.innerHTML = '❌ Verification error'; }
      } else if (verifyDiv) verifyDiv.innerHTML = 'No proof';
    }
  }

  async function fetchWithdrawals() {
    try {
      const res = await fetch(`${API_BASE}/admin/withdrawals?secret=${ADMIN_SECRET}`);
      const data = await res.json();
      withdrawalData = data.requests || [];
      renderWithdrawals();
    } catch(err) {
      document.getElementById('withdrawList').innerHTML = '<p>Error loading withdrawals</p>';
    }
  }

  function renderWithdrawals() {
    const filter = document.getElementById('withdrawFilter').value;
    const container = document.getElementById('withdrawList');
    const filtered = filter === 'all' ? withdrawalData : withdrawalData.filter(req => req.withdrawal_type === filter);
    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding:12px; text-align:center;">✅ No pending withdrawals.</div>';
      return;
    }
    container.innerHTML = filtered.map(req => `
      <div class="request-card">
        <div class="request-info">
          <p><strong>📌 ID:</strong> ${req.id} | 👤 ${escapeHtml(req.username)} (${req.telegram_id})</p>
          <p>📞 ${escapeHtml(req.phone_number)} | 👤 ${escapeHtml(req.receiver_name || 'N/A')}</p>
          <p>💰 ${req.amount} ETB | 🏦 ${req.withdrawal_type} | 🕒 ${new Date(req.created_at).toLocaleString()}</p>
        </div>
        <div class="action-buttons">
          <button class="approve" onclick="processWithdrawal(${req.id}, 'approve')">✅ Approve</button>
          <button class="reject" onclick="processWithdrawal(${req.id}, 'reject')">❌ Reject</button>
        </div>
      </div>
    `).join('');
  }

  async function processDeposit(requestId, action) {
    if (!confirm(`Confirm ${action} deposit #${requestId}?`)) return;
    try {
      const res = await fetch(`${API_BASE}/admin/process-deposit`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, requestId, action })
      });
      const data = await res.json();
      alert(data.success ? `✅ Deposit ${action}d` : (data.error || 'Error'));
      await fetchDeposits();
      updateStats();
    } catch(err) { alert(err.message); }
  }

  async function processWithdrawal(requestId, action) {
    if (!confirm(`Confirm ${action} withdrawal #${requestId}?`)) return;
    try {
      const res = await fetch(`${API_BASE}/admin/process-withdrawal`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, requestId, action })
      });
      const data = await res.json();
      alert(data.success ? `✅ Withdrawal ${action}d` : (data.error || 'Error'));
      await fetchWithdrawals();
      updateStats();
    } catch(err) { alert(err.message); }
  }

  async function addBalance() {
    const telegramId = document.getElementById('userId').value.trim();
    const amount = document.getElementById('amount').value.trim();
    const feedbackDiv = document.getElementById('balanceFeedback');
    if (!telegramId || !amount) { alert('❌ Enter Telegram ID and amount'); return; }
    if (!/^\d+$/.test(telegramId)) { alert('❌ Telegram ID must be numeric'); return; }
    const amountNum = Number(amount);
    if (isNaN(amountNum) || amountNum <= 0) { alert('❌ Positive amount'); return; }
    feedbackDiv.innerHTML = '⏳ Processing...';
    try {
      const res = await fetch(`${API_BASE}/admin/add-balance`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret: ADMIN_SECRET, telegramId, amount: amountNum })
      });
      const data = await res.json();
      if (data.success) {
        alert(`✅ Added ${amountNum} ETB to ${telegramId}. New balance: ${data.newBalance}`);
        feedbackDiv.innerHTML = `✔️ Success: +${amountNum} ETB, new balance ${data.newBalance}`;
        document.getElementById('userId').value = '';
        document.getElementById('amount').value = '';
        await fetchAll();
      } else {
        alert(`❌ Error: ${data.error}`);
        feedbackDiv.innerHTML = `⚠️ ${data.error}`;
      }
    } catch(err) { alert(err.message); feedbackDiv.innerHTML = '❌ Network error'; }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  fetchAll();
  setInterval(() => { fetchAll(); }, 14000);
</script>
</body>
</html>
