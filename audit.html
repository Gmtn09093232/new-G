<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎯 Bingo Audit & Control | Restricted Events</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0b1120;
            font-family: 'Segoe UI', Roboto, 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px 16px;
            color: #e2e8f0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        h1 small {
            font-size: 0.8rem;
            font-weight: normal;
            background: #1e293b;
            padding: 5px 12px;
            border-radius: 40px;
        }
        .summary-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 24px 0;
        }
        .card {
            background: #1e293b;
            border-radius: 28px;
            padding: 16px 20px;
            flex: 1;
            min-width: 150px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border-left: 6px solid #f97316;
        }
        .card .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }
        .card .value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #facc15;
        }
        .filters {
            background: #0f172a;
            border-radius: 32px;
            padding: 18px 20px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            border: 1px solid #334155;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 160px;
        }
        .filter-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #cbd5e6;
        }
        select, input, button {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 8px 12px;
            border-radius: 40px;
            color: #f1f5f9;
            font-size: 0.8rem;
            outline: none;
        }
        button {
            background: #f97316;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            color: #0f172a;
        }
        button:active {
            transform: scale(0.97);
        }
        .action-btn {
            background: #2c3e66;
            color: white;
        }
        .danger-btn {
            background: #b91c1c;
            color: white;
        }
        .logs-table {
            overflow-x: auto;
            background: #0f172a;
            border-radius: 28px;
            padding: 6px;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #2d3a4e;
        }
        th {
            color: #facc15;
            font-weight: 600;
        }
        .event-badge {
            background: #f9731622;
            color: #facc15;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .refresh-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0 8px;
        }
        .control-section {
            background: #0f172a;
            border-radius: 32px;
            padding: 18px 20px;
            margin: 20px 0;
            border: 1px solid #334155;
        }
        .control-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        @media (max-width: 640px) {
            .filter-group { width: 100%; }
            .card .value { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 Bingo Audit & Control <small>Admin dashboard</small></h1>

    <!-- Summary Cards -->
    <div class="summary-cards" id="summaryArea">
        <div class="card"><div class="label">💰 Total Deposits</div><div class="value" id="totalDeposits">—</div></div>
        <div class="card"><div class="label">💸 Total Withdrawals</div><div class="value" id="totalWithdrawals">—</div></div>
        <div class="card"><div class="label">🏦 House Profit</div><div class="value" id="houseProfit">—</div></div>
        <div class="card"><div class="label">📊 Net Float</div><div class="value" id="netFloat">—</div></div>
    </div>

    <!-- Filters (only 4 event types) -->
    <div class="filters">
        <div class="filter-group">
            <label>📌 Event Type</label>
            <select id="eventTypeFilter">
                <option value="">All events (filtered)</option>
                <option value="DEPOSIT_COMPLETED">✅ Deposit Completed</option>
                <option value="WITHDRAWAL_COMPLETED">💸 Withdrawal Completed</option>
                <option value="ADMIN_ADD_BALANCE">⚙️ Admin Add Balance</option>
                <option value="MANUAL_DEPOSIT">📝 Manual Deposit</option>
            </select>
        </div>
        <div class="filter-group">
            <label>🆔 User ID (Telegram)</label>
            <input type="text" id="userIdFilter" placeholder="e.g., 123456789">
        </div>
        <div class="filter-group">
            <label>📅 From date</label>
            <input type="datetime-local" id="fromDate">
        </div>
        <div class="filter-group">
            <label>📅 To date</label>
            <input type="datetime-local" id="toDate">
        </div>
        <div class="filter-group">
            <label>&nbsp;</label>
            <button id="applyFiltersBtn">🔍 Apply Filters</button>
        </div>
        <div class="filter-group">
            <label>&nbsp;</label>
            <button id="resetFiltersBtn" class="action-btn">⟳ Reset</button>
        </div>
    </div>

    <!-- Control section with TOTAL RESET -->
    <div class="control-section">
        <div style="font-weight:bold; margin-bottom:6px;">🎮 Game Control & Total Reset</div>
        <div class="control-buttons">
            <button id="totalResetBtn" class="danger-btn">⚠️ TOTAL RESET (All data)</button>
            <button id="forceResetGame" class="danger-btn">🔄 Force Game Reset</button>
            <button id="reloadLogsBtn" class="action-btn">📜 Reload Audit Logs</button>
        </div>
        <div id="gameStateMessage" style="margin-top:12px; font-size:0.75rem; color:#94a3b8;"></div>
    </div>

    <!-- Logs table -->
    <div class="refresh-row">
        <span><strong>📋 Audit Logs</strong> <span id="logCount"></span></span>
        <span style="font-size:0.7rem;">Last refresh: <span id="lastRefresh">—</span></span>
    </div>
    <div class="logs-table">
        <table id="auditTable">
            <thead>
                <tr><th>Timestamp</th><th>Event</th><th>User ID</th><th>Room</th><th>IP Address</th><th>Details</th></tr>
            </thead>
            <tbody id="auditTableBody">
                <tr><td colspan="6" style="text-align:center;">Loading logs... (enter admin secret)</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- Get admin secret from URL or prompt ---
    const urlParams = new URLSearchParams(window.location.search);
    let ADMIN_SECRET = urlParams.get('secret');
    if (!ADMIN_SECRET) {
        ADMIN_SECRET = prompt("🔐 Enter admin secret for audit panel:");
        if (!ADMIN_SECRET) {
            document.body.innerHTML = '<div style="color:red; text-align:center; margin-top:50px;">Access denied: missing secret.<br>Use /audit?secret=YOUR_SECRET</div>';
            throw new Error('No secret');
        }
    }

    const API_BASE = '';  // relative to current origin

    // DOM elements
    const tbody = document.getElementById('auditTableBody');
    const totalDepositsSpan = document.getElementById('totalDeposits');
    const totalWithdrawalsSpan = document.getElementById('totalWithdrawals');
    const houseProfitSpan = document.getElementById('houseProfit');
    const netFloatSpan = document.getElementById('netFloat');
    const logCountSpan = document.getElementById('logCount');
    const lastRefreshSpan = document.getElementById('lastRefresh');
    const gameStateMsg = document.getElementById('gameStateMessage');

    // Filter inputs
    const eventTypeFilter = document.getElementById('eventTypeFilter');
    const userIdFilter = document.getElementById('userIdFilter');
    const fromDate = document.getElementById('fromDate');
    const toDate = document.getElementById('toDate');
    const applyBtn = document.getElementById('applyFiltersBtn');
    const resetBtn = document.getElementById('resetFiltersBtn');
    const reloadLogsBtn = document.getElementById('reloadLogsBtn');
    const forceResetBtn = document.getElementById('forceResetGame');
    const totalResetBtn = document.getElementById('totalResetBtn');

    let currentLogs = [];

    // Helper: format date for API (ISO string without ms)
    function formatDateForAPI(dateInput) {
        if (!dateInput) return null;
        const d = new Date(dateInput);
        if (isNaN(d.getTime())) return null;
        return d.toISOString();
    }

    // Fetch audit summary
    async function fetchSummary() {
        try {
            const res = await fetch(`${API_BASE}/admin/audit-summary?secret=${ADMIN_SECRET}`);
            if (!res.ok) throw new Error('Summary fetch failed');
            const data = await res.json();
            if (data.success) {
                totalDepositsSpan.innerText = (data.totalDeposits || 0).toLocaleString() + ' ETB';
                totalWithdrawalsSpan.innerText = (data.totalWithdrawals || 0).toLocaleString() + ' ETB';
                houseProfitSpan.innerText = (data.totalHouseProfit || 0).toLocaleString() + ' ETB';
                const net = (data.totalDeposits || 0) - (data.totalWithdrawals || 0);
                netFloatSpan.innerText = net.toLocaleString() + ' ETB';
            } else {
                throw new Error(data.error || 'Unknown');
            }
        } catch (err) {
            console.warn('Summary error:', err);
            totalDepositsSpan.innerText = '⚠️';
            totalWithdrawalsSpan.innerText = '⚠️';
            houseProfitSpan.innerText = '⚠️';
            netFloatSpan.innerText = '⚠️';
        }
    }

    // Fetch audit logs with filters (only selected events, but backend may return all; we filter client-side for the 4 types)
    async function fetchLogs() {
        const params = new URLSearchParams();
        params.append('secret', ADMIN_SECRET);
        params.append('limit', '500');
        const event = eventTypeFilter.value;
        if (event) params.append('eventType', event);  // backend filter if supported
        const userId = userIdFilter.value.trim();
        if (userId) params.append('userId', userId);
        const from = formatDateForAPI(fromDate.value);
        if (from) params.append('from', from);
        const to = formatDateForAPI(toDate.value);
        if (to) params.append('to', to);

        try {
            const res = await fetch(`${API_BASE}/admin/audit?${params.toString()}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.success) {
                let logs = data.logs || [];
                // Filter to only the 4 relevant event types (if backend returns more)
                const allowedEvents = ['DEPOSIT_COMPLETED', 'WITHDRAWAL_COMPLETED', 'ADMIN_ADD_BALANCE', 'MANUAL_DEPOSIT'];
                logs = logs.filter(log => allowedEvents.includes(log.event_type));
                currentLogs = logs;
                renderLogs(currentLogs);
                logCountSpan.innerText = `(${currentLogs.length} entries)`;
                lastRefreshSpan.innerText = new Date().toLocaleTimeString();
            } else {
                throw new Error(data.error || 'Failed');
            }
        } catch (err) {
            console.error(err);
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#f87171;">❌ Error loading logs: ${err.message}</td></tr>`;
            logCountSpan.innerText = '(error)';
        }
    }

    // Render logs table
    function renderLogs(logs) {
        if (!logs.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No audit logs found for the selected events.</td></tr>';
            return;
        }
        let html = '';
        for (const log of logs) {
            const timestamp = new Date(log.timestamp).toLocaleString();
            const eventType = log.event_type || '—';
            const userId = log.user_id || '—';
            const roomId = log.room_id || '—';
            const ip = log.ip_address || '—';
            let details = '';
            try {
                details = JSON.stringify(log.details || {}).slice(0, 100);
                if (JSON.stringify(log.details || {}).length > 100) details += '…';
            } catch(e) { details = '—'; }
            html += `
                <tr>
                    <td style="white-space: nowrap;">${escapeHtml(timestamp)}</td>
                    <td><span class="event-badge">${escapeHtml(eventType)}</span></td>
                    <td>${escapeHtml(userId)}</td>
                    <td>${escapeHtml(roomId)}</td>
                    <td>${escapeHtml(ip)}</td>
                    <td style="max-width:300px; word-break:break-all;">${escapeHtml(details)}</td>
                </tr>
            `;
        }
        tbody.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // --- Control functions ---
    async function forceResetGame() {
        if (!confirm("⚠️ Force reset the game lobby? This will end current game and clear players.")) return;
        gameStateMsg.innerText = "Sending reset command...";
        try {
            const res = await fetch(`${API_BASE}/admin/reset-game?secret=${ADMIN_SECRET}`, { method: 'POST' });
            if (res.ok) {
                const data = await res.json();
                gameStateMsg.innerText = `✅ Reset command sent: ${data.message || 'Game reset'}`;
            } else {
                throw new Error(`HTTP ${res.status}`);
            }
        } catch (err) {
            gameStateMsg.innerText = `❌ Reset endpoint not available. (${err.message}) - Implement /admin/reset-game on server.`;
            console.warn(err);
        }
    }

    async function totalReset() {
        if (!confirm("🚨 DANGER: TOTAL RESET will delete all deposit/withdrawal requests, game history, and reset user balances to 10 ETB. This cannot be undone. Are you ABSOLUTELY sure?")) return;
        if (!confirm("Type 'RESET ALL' to confirm:")) return;
        const confirmation = prompt('Type "RESET ALL" to proceed:');
        if (confirmation !== 'RESET ALL') {
            alert('Total reset cancelled.');
            return;
        }
        gameStateMsg.innerText = "Executing total reset...";
        try {
            const res = await fetch(`${API_BASE}/admin/total-reset?secret=${ADMIN_SECRET}`, { method: 'POST' });
            if (res.ok) {
                const data = await res.json();
                gameStateMsg.innerText = `✅ Total reset completed: ${data.message || 'All data wiped'}`;
                // refresh summary and logs after reset
                await fetchSummary();
                await fetchLogs();
            } else {
                throw new Error(`HTTP ${res.status}`);
            }
        } catch (err) {
            gameStateMsg.innerText = `❌ Total reset endpoint not available. (${err.message}) - Implement /admin/total-reset on server.`;
            console.warn(err);
        }
    }

    // --- Initial load and event listeners ---
    async function refreshAll() {
        await Promise.all([fetchSummary(), fetchLogs()]);
    }

    applyBtn.addEventListener('click', () => {
        fetchLogs();
    });
    resetBtn.addEventListener('click', () => {
        eventTypeFilter.value = '';
        userIdFilter.value = '';
        fromDate.value = '';
        toDate.value = '';
        fetchLogs();
    });
    reloadLogsBtn.addEventListener('click', fetchLogs);
    forceResetBtn.addEventListener('click', forceResetGame);
    totalResetBtn.addEventListener('click', totalReset);

    // Auto-refresh every 30 sec
    setInterval(() => {
        if (document.hasFocus()) fetchLogs();
    }, 30000);

    refreshAll();
</script>
</body>
</html>
