<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>🔍 Audit Vault | Bingo Auditor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f1c 0%, #050814 100%);
      color: #f0f3fa;
      padding: 20px 16px 40px;
      min-height: 100vh;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    /* glass header */
    .glass-header {
      background: rgba(18, 25, 45, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 1.8rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(243, 156, 18, 0.3);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f39c12, #ffcc70);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .back-link {
      background: linear-gradient(95deg, #2c3e66, #1e2a3e);
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .back-link:hover {
      background: linear-gradient(95deg, #3a4e7a, #2a3a50);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(243,156,18,0.2);
      color: white;
    }

    @media (max-width: 680px) {
      .glass-header { flex-direction: column; align-items: stretch; text-align: center; }
      h1 { font-size: 1.3rem; justify-content: center; }
      .back-link { justify-content: center; }
    }

    /* summary cards */
    .summary-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: rgba(22, 32, 42, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1rem 1.8rem;
      flex: 1;
      min-width: 180px;
      border-left: 4px solid #f39c12;
      transition: 0.2s;
    }
    .summary-card h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #adb7c9;
      margin-bottom: 6px;
    }
    .summary-card .value {
      font-size: 2rem;
      font-weight: 800;
      color: #f39c12;
      line-height: 1.2;
    }
    @media (max-width: 640px) {
      .summary-card .value { font-size: 1.5rem; }
      .summary-card { padding: 0.8rem 1.2rem; }
    }

    /* filter panel - STACKED for Room ID, User ID, Event Type */
    .filter-panel {
      background: rgba(18, 28, 40, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.2rem 1.2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(243, 156, 18, 0.2);
    }
    .filter-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1rem;
      font-weight: 600;
      color: #f39c12;
      font-size: 0.85rem;
    }
    /* each filter group takes full width */
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
      width: 100%;
    }
    .filter-group label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      color: #f39c12;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .filter-group input, .filter-group select {
      background: #0f172ad9;
      border: 1px solid #2d3a4e;
      padding: 8px 12px;
      border-radius: 40px;
      color: #f0f3fa;
      font-size: 0.8rem;
      transition: 0.2s;
      outline: none;
      font-family: inherit;
      width: 100%;
    }
    .filter-group input:focus, .filter-group select:focus {
      border-color: #f39c12;
      box-shadow: 0 0 0 2px rgba(243,156,18,0.3);
    }
    /* date row: two fields side by side */
    .date-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 8px 0 16px 0;
    }
    .date-row .filter-group {
      flex: 1;
      margin-bottom: 0;
    }
    .filter-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .search-btn, .reset-btn {
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .search-btn {
      background: linear-gradient(105deg, #f39c12, #e67e22);
      color: #0a0f1c;
    }
    .reset-btn {
      background: #2c3e66;
      color: white;
    }
    .search-btn:hover, .reset-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 8px 20px rgba(243,156,18,0.3);
    }
    @media (max-width: 560px) {
      .date-row { flex-direction: column; gap: 8px; }
      .filter-actions { justify-content: stretch; }
      .search-btn, .reset-btn { flex: 1; justify-content: center; }
    }

    /* table wrapper */
    .table-wrapper {
      background: rgba(12, 20, 30, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 1.8rem;
      overflow-x: auto;
      border: 1px solid rgba(243, 156, 18, 0.2);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 1rem 1rem;
      background: rgba(15, 23, 42, 0.8);
      color: #f39c12;
      font-weight: 600;
      border-bottom: 1px solid #2d3a4e;
    }
    td {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid #1e2a36;
      vertical-align: top;
    }
    tr:hover td {
      background: rgba(26, 38, 51, 0.5);
    }
    /* human-readable details */
    .details-text {
      background: #03060ecc;
      padding: 6px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: #ccddee;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .badge-event {
      background: #2a3a4e;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-block;
      white-space: nowrap;
    }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #8a99b0;
      font-size: 0.9rem;
    }
    .timestamp-cell {
      font-family: monospace;
      white-space: nowrap;
    }
    .ip-cell {
      font-family: monospace;
      font-size: 0.75rem;
    }
    @media (max-width: 780px) {
      th, td { padding: 0.6rem; font-size: 0.75rem; }
      .badge-event { white-space: normal; font-size: 0.65rem; }
      .timestamp-cell { white-space: normal; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-header">
    <h1>🔍 AUDIT VAULT · IMMUTABLE LEDGER</h1>
    <a href="admin.html" class="back-link">⬅ Back to Admin Panel</a>
  </div>

  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="summary-card">
      <h3>💰 Total Deposits (approved)</h3>
      <div class="value" id="totalDeposits">— ETB</div>
    </div>
    <div class="summary-card">
      <h3>💸 Total Withdrawals (approved)</h3>
      <div class="value" id="totalWithdrawals">— ETB</div>
    </div>
    <div class="summary-card">
      <h3>🏠 House Profit (20% model)</h3>
      <div class="value" id="totalHouseProfit">— ETB</div>
    </div>
  </div>

  <!-- Filter Panel - STACKED layout: each filter on its own line -->
  <div class="filter-panel">
    <div class="filter-title">
      <span>🔎</span> Filter audit logs
    </div>
    
    <!-- Room ID - separate line -->
    <div class="filter-group">
      <label>🏷️ ROOM ID</label>
      <input type="text" id="filter-room" placeholder="e.g., global / room_123">
    </div>
    
    <!-- User ID - separate line -->
    <div class="filter-group">
      <label>👤 USER ID (TELEGRAM)</label>
      <input type="text" id="filter-user" placeholder="numeric ID">
    </div>
    
    <!-- Event Type - separate line -->
    <div class="filter-group">
      <label>⚡ EVENT TYPE</label>
      <select id="filter-event">
        <option value="">All Events</option>
        <option value="DEPOSIT_INITIATED">📥 Deposit Initiated</option>
        <option value="DEPOSIT_COMPLETED">✅ Deposit Completed</option>
        <option value="DEPOSIT_FAILED">❌ Deposit Failed</option>
        <option value="WITHDRAWAL_REQUESTED">📤 Withdrawal Requested</option>
        <option value="WITHDRAWAL_COMPLETED">💸 Withdrawal Completed</option>
        <option value="WITHDRAWAL_REJECTED">🚫 Withdrawal Rejected</option>
        <option value="BINGO_CALLED">🎯 Bingo Called</option>
        <option value="BINGO_REJECTED">⚠️ Bingo Rejected</option>
        <option value="WIN_PAID_OUT">🏆 Win Paid Out</option>
        <option value="NUMBER_DRAWN">🔢 Number Drawn</option>
        <option value="CARD_ASSIGNED">🃏 Card Assigned</option>
        <option value="ADMIN_ADD_BALANCE">⚙️ Admin Add Balance</option>
        <option value="SUSPICIOUS_BEHAVIOR_DETECTED">🚨 Suspicious Activity</option>
      </select>
    </div>
    
    <!-- Date range row (From / To side by side) -->
    <div class="date-row">
      <div class="filter-group">
        <label>📅 FROM</label>
        <input type="datetime-local" id="filter-from">
      </div>
      <div class="filter-group">
        <label>📅 TO</label>
        <input type="datetime-local" id="filter-to">
      </div>
    </div>
    
    <!-- Action buttons -->
    <div class="filter-actions">
      <button class="search-btn" onclick="loadAuditLogs()">🔎 Search Logs</button>
      <button class="reset-btn" onclick="resetFilters()">⟳ Reset Filters</button>
    </div>
  </div>

  <!-- Audit Table -->
  <div class="table-wrapper">
    <table id="audit-table">
      <thead>
        <tr>
          <th>⏱️ Timestamp</th>
          <th>📌 Event</th>
          <th>🏷️ Room</th>
          <th>🆔 User ID</th>
          <th>🌐 IP Address</th>
          <th>📄 Details</th>
        </tr>
      </thead>
      <tbody id="audit-tbody">
        <tr><td colspan="6" class="empty-state">🔐 Use filters and click "Search Logs"</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const AUDITOR_SECRET = prompt("🔐 Enter AUDITOR SECRET:") || "auditor_secret_here";
  const API_BASE = '';

  async function loadSummary() {
    try {
      const res = await fetch(`${API_BASE}/admin/audit-summary?secret=${AUDITOR_SECRET}`);
      const data = await res.json();
      if (data.success) {
        document.getElementById('totalDeposits').innerText = `${Number(data.totalDeposits).toLocaleString()} ETB`;
        document.getElementById('totalWithdrawals').innerText = `${Number(data.totalWithdrawals).toLocaleString()} ETB`;
        document.getElementById('totalHouseProfit').innerText = `${Number(data.totalHouseProfit).toLocaleString()} ETB`;
      } else {
        document.getElementById('totalDeposits').innerText = '⚠️ error';
      }
    } catch (err) {
      document.getElementById('totalDeposits').innerText = '⚠️ offline';
    }
  }

  async function loadAuditLogs() {
    const params = new URLSearchParams();
    params.append('secret', AUDITOR_SECRET);
    const roomId = document.getElementById('filter-room').value.trim();
    const userId = document.getElementById('filter-user').value.trim();
    const eventType = document.getElementById('filter-event').value;
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;

    if (roomId) params.append('roomId', roomId);
    if (userId) params.append('userId', userId);
    if (eventType) params.append('eventType', eventType);
    if (from) params.append('from', new Date(from).toISOString());
    if (to) params.append('to', new Date(to).toISOString());
    params.append('limit', '600');

    const tbody = document.getElementById('audit-tbody');
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">⏳ Loading secure logs...</td></tr>`;

    try {
      const res = await fetch(`${API_BASE}/admin/audit?${params}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed');
      renderAuditTable(data.logs);
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-state" style="color:#e74c3c;">❌ Error: ${escapeHtml(err.message)}</td></tr>`;
    }
  }

  function resetFilters() {
    document.getElementById('filter-room').value = '';
    document.getElementById('filter-user').value = '';
    document.getElementById('filter-event').value = '';
    const now = new Date();
    const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
    document.getElementById('filter-from').value = yesterday.toISOString().slice(0, 16);
    document.getElementById('filter-to').value = now.toISOString().slice(0, 16);
    loadAuditLogs();
  }

  // Convert JSON details to human-readable summary (no JSON)
  function formatDetails(details) {
    if (!details) return '—';
    let text = '';
    if (details.amount) text += `💰 Amount: ${details.amount} ETB · `;
    if (details.payment_type) text += `🏦 Method: ${details.payment_type} · `;
    if (details.withdrawal_type) text += `🏦 Type: ${details.withdrawal_type} · `;
    if (details.reference_number) text += `🧾 Ref: ${details.reference_number} · `;
    if (details.status) text += `📌 Status: ${details.status} · `;
    if (details.reason) text += `⚠️ Reason: ${details.reason} · `;
    if (details.room_id) text += `🏷️ Room: ${details.room_id} · `;
    if (details.card_numbers) text += `🃏 Numbers: ${details.card_numbers} · `;
    if (details.win_amount) text += `🏆 Win: ${details.win_amount} ETB · `;
    if (details.balance_before !== undefined) text += `📊 Before: ${details.balance_before} → After: ${details.balance_after} · `;
    if (details.admin_id) text += `👑 Admin: ${details.admin_id} · `;
    if (details.ip_address) text += `🌐 IP: ${details.ip_address} · `;
    if (details.message) text += `💬 ${details.message} · `;
    if (text === '') {
      const keys = Object.keys(details).slice(0, 4);
      text = keys.map(k => `${k}: ${details[k]}`).join(' · ');
    }
    return text.replace(/ · $/, '');
  }

  function renderAuditTable(logs) {
    const tbody = document.getElementById('audit-tbody');
    if (!logs || logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">📭 No audit logs match the current filters.</td></tr>';
      return;
    }
    tbody.innerHTML = logs.map(log => {
      let eventTypeClean = log.event_type || 'UNKNOWN';
      let badgeColor = '#f39c12';
      if (eventTypeClean.includes('DEPOSIT_COMPLETED')) badgeColor = '#2ecc71';
      else if (eventTypeClean.includes('REJECT') || eventTypeClean.includes('FAILED')) badgeColor = '#e74c3c';
      else if (eventTypeClean.includes('SUSPICIOUS')) badgeColor = '#e67e22';
      else if (eventTypeClean.includes('WIN_PAID_OUT')) badgeColor = '#ffcc70';
      
      const detailsText = formatDetails(log.details);
      return `
        <tr>
          <td class="timestamp-cell">${new Date(log.timestamp).toLocaleString()}</td>
          <td><span class="badge-event" style="background: ${badgeColor}20; color: ${badgeColor}; border:1px solid ${badgeColor}40;">${escapeHtml(eventTypeClean)}</span></td>
          <td>${log.room_id ? escapeHtml(log.room_id) : '—'}</td>
          <td style="font-family:monospace;">${log.user_id ? escapeHtml(log.user_id) : '—'}</td>
          <td class="ip-cell">${log.ip_address ? escapeHtml(log.ip_address) : '—'}</td>
          <td><div class="details-text">${escapeHtml(detailsText)}</div></td>
        </tr>
      `;
    }).join('');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  window.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
    document.getElementById('filter-from').value = yesterday.toISOString().slice(0, 16);
    document.getElementById('filter-to').value = now.toISOString().slice(0, 16);
    loadSummary();
    loadAuditLogs();
  });
</script>
</body>
</html>
