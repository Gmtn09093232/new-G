<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🔍 Audit Vault | Bingo Auditor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f1c 0%, #03060c 100%);
      color: #f0f3fa;
      padding: 1.5rem;
      min-height: 100vh;
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
    }
    /* header */
    .glass-nav {
      background: rgba(18, 25, 45, 0.6);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(243, 156, 18, 0.25);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f39c12, #ffcc70);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-link {
      background: rgba(30, 42, 54, 0.8);
      padding: 8px 20px;
      border-radius: 40px;
      text-decoration: none;
      color: #f39c12;
      font-weight: 500;
      transition: 0.2s;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
    }
    .back-link:hover {
      background: #f39c12;
      color: #0a0f1c;
      transform: translateY(-2px);
    }
    /* summary cards */
    .summary-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .summary-card {
      background: rgba(22, 32, 42, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      padding: 1.3rem 1.8rem;
      flex: 1;
      min-width: 180px;
      border-left: 5px solid #f39c12;
      transition: all 0.2s;
    }
    .summary-card h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #adb7c9;
      margin-bottom: 8px;
    }
    .summary-card .value {
      font-size: 2rem;
      font-weight: 800;
      color: #f39c12;
      line-height: 1;
    }
    /* filter section */
    .filter-panel {
      background: rgba(18, 28, 40, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(243, 156, 18, 0.2);
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1 1 180px;
    }
    .filter-group label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: #f39c12;
    }
    .filter-group input, .filter-group select {
      background: #0f172ad9;
      border: 1px solid #2d3a4e;
      padding: 10px 14px;
      border-radius: 2rem;
      color: white;
      font-size: 0.85rem;
      transition: 0.2s;
      outline: none;
    }
    .filter-group input:focus, .filter-group select:focus {
      border-color: #f39c12;
      box-shadow: 0 0 0 2px rgba(243,156,18,0.2);
    }
    .search-btn {
      background: linear-gradient(105deg, #f39c12, #e67e22);
      border: none;
      padding: 10px 28px;
      border-radius: 40px;
      font-weight: 700;
      color: #0a0f1c;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .search-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
      box-shadow: 0 8px 20px rgba(243,156,18,0.3);
    }
    /* table wrapper */
    .table-wrapper {
      background: rgba(12, 20, 30, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 1.8rem;
      padding: 0;
      overflow-x: auto;
      border: 1px solid #2a3a4e55;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 1rem 1rem;
      background: #0f172a;
      color: #f39c12;
      font-weight: 600;
      border-bottom: 1px solid #2d3a4e;
    }
    td {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid #1e2a36;
      vertical-align: top;
    }
    tr:hover td {
      background: #1a2633aa;
    }
    pre {
      background: #03060ecc;
      padding: 8px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      margin: 0;
      color: #ccddee;
    }
    .badge-event {
      background: #2a3a4e;
      padding: 4px 10px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-block;
    }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #8a99b0;
    }
    @media (max-width: 780px) {
      body { padding: 1rem; }
      .glass-nav { flex-direction: column; gap: 12px; align-items: stretch; }
      .filters { flex-direction: column; }
      .filter-group { width: 100%; }
      th, td { padding: 0.6rem; font-size: 0.75rem; }
    }
    .timestamp-cell {
      font-family: monospace;
      white-space: nowrap;
    }
    .ip-cell {
      font-family: monospace;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-nav">
    <h1>🔍 AUDIT VAULT · IMMUTABLE LEDGER</h1>
    <a href="admin.html" class="back-link">⬅ Back to Admin Panel</a>
  </div>

  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="summary-card">
      <h3>💰 Total Deposits (approved)</h3>
      <div class="value" id="totalDeposits">— ETB</div>
    </div>
    <div class="summary-card">
      <h3>💸 Total Withdrawals (approved)</h3>
      <div class="value" id="totalWithdrawals">— ETB</div>
    </div>
    <div class="summary-card">
      <h3>🏠 House Profit (20% model)</h3>
      <div class="value" id="totalHouseProfit">— ETB</div>
    </div>
  </div>

  <!-- Filter Panel -->
  <div class="filter-panel">
    <div class="filters">
      <div class="filter-group">
        <label>🏷️ Room ID</label>
        <input type="text" id="filter-room" placeholder="e.g., global / room_123">
      </div>
      <div class="filter-group">
        <label>👤 User ID (Telegram)</label>
        <input type="text" id="filter-user" placeholder="numeric ID">
      </div>
      <div class="filter-group">
        <label>⚡ Event Type</label>
        <select id="filter-event">
          <option value="">All Events</option>
          <option value="DEPOSIT_INITIATED">📥 Deposit Initiated</option>
          <option value="DEPOSIT_COMPLETED">✅ Deposit Completed</option>
          <option value="DEPOSIT_FAILED">❌ Deposit Failed</option>
          <option value="WITHDRAWAL_REQUESTED">📤 Withdrawal Requested</option>
          <option value="WITHDRAWAL_COMPLETED">💸 Withdrawal Completed</option>
          <option value="WITHDRAWAL_REJECTED">🚫 Withdrawal Rejected</option>
          <option value="BINGO_CALLED">🎯 Bingo Called</option>
          <option value="BINGO_REJECTED">⚠️ Bingo Rejected</option>
          <option value="WIN_PAID_OUT">🏆 Win Paid Out</option>
          <option value="NUMBER_DRAWN">🔢 Number Drawn</option>
          <option value="CARD_ASSIGNED">🃏 Card Assigned</option>
          <option value="ADMIN_ADD_BALANCE">⚙️ Admin Add Balance</option>
          <option value="SUSPICIOUS_BEHAVIOR_DETECTED">🚨 Suspicious Activity</option>
        </select>
      </div>
      <div class="filter-group">
        <label>📅 From</label>
        <input type="datetime-local" id="filter-from">
      </div>
      <div class="filter-group">
        <label>📅 To</label>
        <input type="datetime-local" id="filter-to">
      </div>
      <div class="filter-group" style="flex: 0 0 auto;">
        <label>&nbsp;</label>
        <button class="search-btn" onclick="loadAuditLogs()">🔎 Search Logs</button>
      </div>
    </div>
  </div>

  <!-- Audit Table -->
  <div class="table-wrapper">
    <table id="audit-table">
      <thead>
        <tr>
          <th>⏱️ Timestamp</th>
          <th>📌 Event</th>
          <th>🏷️ Room</th>
          <th>🆔 User ID</th>
          <th>🌐 IP Address</th>
          <th>📄 Details (JSON)</th>
        </tr>
      </thead>
      <tbody id="audit-tbody">
        <tr><td colspan="6" class="empty-state">🔐 Use filters and click "Search Logs"</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // Auditor secret (separate from admin secret)
  const AUDITOR_SECRET = prompt("🔐 Enter AUDITOR SECRET:") || "auditor_secret_here";
  const API_BASE = '';

  // ------------------- Load summary stats -------------------
  async function loadSummary() {
    try {
      const res = await fetch(`${API_BASE}/admin/audit-summary?secret=${AUDITOR_SECRET}`);
      const data = await res.json();
      if (data.success) {
        document.getElementById('totalDeposits').innerText = `${Number(data.totalDeposits).toLocaleString()} ETB`;
        document.getElementById('totalWithdrawals').innerText = `${Number(data.totalWithdrawals).toLocaleString()} ETB`;
        document.getElementById('totalHouseProfit').innerText = `${Number(data.totalHouseProfit).toLocaleString()} ETB`;
      } else {
        console.warn("Summary error:", data.error);
        document.getElementById('totalDeposits').innerText = '⚠️ error';
      }
    } catch (err) {
      console.error('Summary fetch failed', err);
      document.getElementById('totalDeposits').innerText = '⚠️ offline';
    }
  }

  // ------------------- Load audit logs with filters -------------------
  async function loadAuditLogs() {
    const params = new URLSearchParams();
    params.append('secret', AUDITOR_SECRET);
    const roomId = document.getElementById('filter-room').value.trim();
    const userId = document.getElementById('filter-user').value.trim();
    const eventType = document.getElementById('filter-event').value;
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;

    if (roomId) params.append('roomId', roomId);
    if (userId) params.append('userId', userId);
    if (eventType) params.append('eventType', eventType);
    if (from) params.append('from', new Date(from).toISOString());
    if (to) params.append('to', new Date(to).toISOString());
    params.append('limit', '600');

    const tbody = document.getElementById('audit-tbody');
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="loader">⏳ Loading secure logs...</div></td></tr>';

    try {
      const res = await fetch(`${API_BASE}/admin/audit?${params}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Failed to fetch logs');
      renderAuditTable(data.logs);
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-state" style="color:#e74c3c;">❌ Error: ${escapeHtml(err.message)}</td></tr>`;
    }
  }

  // ------------------- Render table rows with formatting -------------------
  function renderAuditTable(logs) {
    const tbody = document.getElementById('audit-tbody');
    if (!logs || logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">📭 No audit logs match the current filters.</td></tr>';
      return;
    }
    tbody.innerHTML = logs.map(log => {
      const eventTypeClean = log.event_type || 'UNKNOWN';
      let badgeColor = '#f39c12';
      if (eventTypeClean.includes('DEPOSIT_COMPLETED')) badgeColor = '#2ecc71';
      else if (eventTypeClean.includes('REJECT') || eventTypeClean.includes('FAILED')) badgeColor = '#e74c3c';
      else if (eventTypeClean.includes('SUSPICIOUS')) badgeColor = '#e67e22';
      else if (eventTypeClean.includes('WIN_PAID_OUT')) badgeColor = '#ffcc70';
      return `
        <tr>
          <td class="timestamp-cell">${new Date(log.timestamp).toLocaleString()}</td>
          <td><span class="badge-event" style="background: ${badgeColor}20; color: ${badgeColor}; border:1px solid ${badgeColor}40;">${escapeHtml(eventTypeClean)}</span></td>
          <td>${log.room_id ? escapeHtml(log.room_id) : '—'}</td>
          <td style="font-family:monospace;">${log.user_id ? escapeHtml(log.user_id) : '—'}</td>
          <td class="ip-cell">${log.ip_address ? escapeHtml(log.ip_address) : '—'}</td>
          <td><pre>${escapeJson(log.details)}</pre></td>
        </tr>
      `;
    }).join('');
  }

  // ------------------- Helper: escape HTML & pretty JSON -------------------
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  function escapeJson(obj) {
    if (!obj) return '{}';
    try {
      let str = JSON.stringify(obj, null, 2);
      return escapeHtml(str);
    } catch(e) {
      return escapeHtml(String(obj));
    }
  }

  // ------------------- initial load: set default last 24h and fetch -------------------
  window.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
    const todayEnd = new Date();
    document.getElementById('filter-from').value = yesterday.toISOString().slice(0, 16);
    document.getElementById('filter-to').value = todayEnd.toISOString().slice(0, 16);
    loadSummary();       // load financial summary
    loadAuditLogs();     // load logs for last 24h
  });
</script>
</body>
</html>
