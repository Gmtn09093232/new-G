<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔍 Audit Logs – Independent Auditor</title>
  <style>
    body { font-family: system-ui; background: #0a0f1c; color: #eee; padding: 20px; }
    .container { max-width: 1400px; margin: auto; }
    h1 { color: #f39c12; }
    .nav-link { color: #f39c12; font-weight: bold; margin-left: 20px; }
    .section { background: #16202a; margin: 20px 0; padding: 20px; border-radius: 24px; }
    .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; }
    .filter-group label { font-size: 0.85rem; margin-bottom: 4px; color: #aaa; }
    .filter-group input, .filter-group select {
      padding: 8px 12px; border-radius: 8px; border: 1px solid #334; background: #1e2a36; color: #eee;
    }
    button { background: #f39c12; border: none; padding: 8px 20px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    button:hover { background: #e67e22; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #233; font-size: 0.85rem; }
    th { background: #1e2a36; color: #f39c12; }
    tr:hover { background: #1a2530; }
    pre { background: #0f1a24; padding: 6px; border-radius: 8px; white-space: pre-wrap; word-break: break-word; font-size: 0.8rem; }
    .error { color: #e74c3c; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔍 Audit Logs <a href="admin.html" class="nav-link" style="font-size:0.8em;">⬅ Back to Admin Panel</a></h1>

    <div class="summary-cards" style="display: flex; gap: 20px; margin-bottom: 20px;">
  <div style="flex:1; background:#1e2a36; padding:15px; border-radius:12px; text-align:center;">
    <h3 style="margin:0; color:#f39c12;">💰 Total Deposits</h3>
    <p id="totalDeposits" style="font-size:1.5em; margin:5px 0;">...</p>
  </div>
  <div style="flex:1; background:#1e2a36; padding:15px; border-radius:12px; text-align:center;">
    <h3 style="margin:0; color:#f39c12;">💸 Total Withdrawals</h3>
    <p id="totalWithdrawals" style="font-size:1.5em; margin:5px 0;">...</p>
  </div>
  <div style="flex:1; background:#1e2a36; padding:15px; border-radius:12px; text-align:center;">
    <h3 style="margin:0; color:#f39c12;">🏠 House Profit (20%)</h3>
    <p id="totalHouseProfit" style="font-size:1.5em; margin:5px 0;">...</p>
  </div>
</div>
  
  <div class="section">
    <div class="filters">
      <div class="filter-group">
        <label for="filter-room">Room ID</label>
        <input type="text" id="filter-room" placeholder="e.g. room_123">
      </div>
      <div class="filter-group">
        <label for="filter-user">User ID</label>
        <input type="text" id="filter-user" placeholder="Telegram ID">
      </div>
      <div class="filter-group">
        <label for="filter-event">Event Type</label>
        <select id="filter-event">
          <option value="">All Events</option>
          <option value="DEPOSIT_INITIATED">Deposit Initiated</option>
          <option value="DEPOSIT_COMPLETED">Deposit Completed</option>
          <option value="DEPOSIT_FAILED">Deposit Failed</option>
          <option value="WITHDRAWAL_REQUESTED">Withdrawal Requested</option>
          <option value="WITHDRAWAL_COMPLETED">Withdrawal Completed</option>
          <option value="WITHDRAWAL_REJECTED">Withdrawal Rejected</option>
          <option value="BINGO_CALLED">Bingo Called</option>
          <option value="BINGO_VERIFIED">Bingo Verified</option>
          <option value="BINGO_REJECTED">Bingo Rejected</option>
          <option value="WIN_PAID_OUT">Win Paid Out</option>
          <option value="NUMBER_DRAWN">Number Drawn</option>
          <option value="CARD_ASSIGNED">Card Assigned</option>
          <option value="ADMIN_LOGIN">Admin Login</option>
          <option value="ADMIN_CONFIG_CHANGE">Admin Config Change</option>
          <option value="ADMIN_BAN_PLAYER">Admin Ban Player</option>
          <option value="SUSPICIOUS_BEHAVIOR_DETECTED">Suspicious Activity</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-from">From</label>
        <input type="datetime-local" id="filter-from">
      </div>
      <div class="filter-group">
        <label for="filter-to">To</label>
        <input type="datetime-local" id="filter-to">
      </div>
      <button onclick="loadAuditLogs()">🔎 Search</button>
    </div>

    <table id="audit-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Event Type</th>
          <th>Room ID</th>
          <th>User ID</th>
          <th>IP Address</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="audit-tbody">
        <tr><td colspan="6" style="text-align:center; color:#888;">Use filters and click Search</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // 🔐 Auditor’s own secret – NOT the admin secret
  const AUDITOR_SECRET = prompt("Enter auditor secret:") || "auditor_secret_here";
  const API_BASE = '';

  // Load audit logs
  async function loadAuditLogs() {
    const params = new URLSearchParams();
    params.append('secret', AUDITOR_SECRET);    // ← auditor secret here
    const roomId = document.getElementById('filter-room').value.trim();
    const userId = document.getElementById('filter-user').value.trim();
    const eventType = document.getElementById('filter-event').value;
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;

    if (roomId) params.append('roomId', roomId);
    if (userId) params.append('userId', userId);
    if (eventType) params.append('eventType', eventType);
    if (from) params.append('from', new Date(from).toISOString());
    if (to) params.append('to', new Date(to).toISOString());
    params.append('limit', '500');

    const tbody = document.getElementById('audit-tbody');
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Loading...</td></tr>';
    try {
      const res = await fetch(`${API_BASE}/admin/audit?${params}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Unknown error');
      renderAuditTable(data.logs);
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#e74c3c;">Error: ${err.message}</td></tr>`;
    }
  }

  async function loadSummary() {
  try {
    const res = await fetch(`${API_BASE}/admin/audit-summary?secret=${AUDITOR_SECRET}`);
    const data = await res.json();
    if (data.success) {
      document.getElementById('totalDeposits').textContent = data.totalDeposits + ' ETB';
      document.getElementById('totalWithdrawals').textContent = data.totalWithdrawals + ' ETB';
      document.getElementById('totalHouseProfit').textContent = data.totalHouseProfit + ' ETB';
    }
  } catch (err) {
    console.error('Summary error:', err);
  }
}

// Call it together with initial audit load
window.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  const yesterday = new Date(now.getTime() - 24*60*60*1000);
  document.getElementById('filter-from').value = yesterday.toISOString().slice(0,16);
  loadAuditLogs();
  loadSummary();   // <-- added
});
  function renderAuditTable(logs) {
    const tbody = document.getElementById('audit-tbody');
    if (!logs || logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No matching logs found.</td></tr>';
      return;
    }
    tbody.innerHTML = logs.map(log => `
      <tr>
        <td>${new Date(log.timestamp).toLocaleString()}</td>
        <td><strong>${log.event_type}</strong></td>
        <td>${log.room_id || '-'}</td>
        <td>${log.user_id}</td>
        <td>${log.ip_address || '-'}</td>
        <td><pre>${JSON.stringify(log.details, null, 2)}</pre></td>
      </tr>
    `).join('');
  }

  // Default: show last 24 hours
  window.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    const yesterday = new Date(now.getTime() - 24*60*60*1000);
    document.getElementById('filter-from').value = yesterday.toISOString().slice(0,16);
    loadAuditLogs();
  });
</script>
</body>
</html>
